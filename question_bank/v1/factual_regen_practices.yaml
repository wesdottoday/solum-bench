          Compare swale-based water harvesting with keyline design for managing water on sloping agricultural land. How does each system work, and in what contexts is each most appropriate?
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["contour", "water", "infiltration"]
      rubric_criteria:
        - name: swale_description
          description: "Describes swales as level-bottom ditches dug on contour that capture and infiltrate runoff, with berms on the downhill side often planted with trees"
          max_points: 3
        - name: keyline_description
          description: "Describes keyline as off-contour plowing from the keypoint, with lines drifting toward ridges to distribute water from valleys to drier ridge areas"
          max_points: 3
        - name: swale_context
          description: "Notes swales are best on gentler slopes (<15%), in permaculture/agroforestry systems, and in drier climates where maximizing infiltration is critical"
