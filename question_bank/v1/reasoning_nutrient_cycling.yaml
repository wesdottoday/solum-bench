          Explain how deep-rooted perennial plants (such as trees in agroforestry systems or deep-rooted prairie grasses) contribute to nutrient cycling through what is called the "nutrient pump" or "nutrient lift" effect. How does this process redistribute nutrients vertically in the soil profile, and why is it particularly valuable in leaching-prone environments?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should explain: deep roots (2-10+ meters) access nutrient pools below the rooting depth of annual crops; nutrients absorbed from subsoil are incorporated into biomass; leaf litter, root turnover, and root exudates deposit these nutrients in the topsoil; this effectively moves nutrients upward against the direction of leaching; especially important for mobile nutrients (NO3-, SO42-, K+) that leach below annual crop root zones; in agroforestry, tree roots intercept nutrients leaching past crop roots ('safety net' function); trees also weather subsoil minerals making previously unavailable nutrients accessible; calcium and magnesium from deep weathering enriches topsoil through litterfall; quantification: a mature tree can cycle 50-200 kg Ca/ha/yr through this mechanism; in leaching-prone sandy soils or high-rainfall environments, this prevents permanent nutrient loss from the system; practical implications for alley cropping, silvopasture, and prairie restoration."
    tags: [nutrient_pump, deep_rooting, agroforestry, nutrient_cycling, leaching]

  - id: reasoning_nutrient_cycling_0023
