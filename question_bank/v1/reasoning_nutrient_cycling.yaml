          What role do soil microorganisms play as a "living nutrient reservoir"? Explain how the microbial biomass pool stores and releases nutrients, and why management practices that kill or reduce soil microbial populations can lead to short-term nutrient flushes followed by long-term nutrient deficits.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should explain: soil microbial biomass typically contains 1-5% of total soil C, 2-6% of total N, 1-5% of total P; this is a dynamic pool with rapid turnover (bacterial generation time hours to days); nutrients in living microbes are protected from leaching; when microbes die (from drying, tillage, fumigation, biocide application), their cellular contents are released (biomass flush or 'Birch effect' for wetting-drying); this produces a pulse of available N, P, S; but if the cause of mortality persists (e.g., repeated fumigation, chronic tillage), the biomass pool shrinks permanently; smaller microbial biomass means: less nutrient cycling capacity, reduced disease suppression, lower enzyme production for organic matter decomposition, and greater dependency on external fertilizer inputs; healthy soils may have 500-1000 kg microbial biomass C per hectare representing a significant nutrient bank."
    tags: [microbial_biomass, nutrient_reservoir, soil_biology, nutrient_cycling]

