  - id: reasoning_nutrient_cycling_0025
    question_type: open_ended
    difficulty: medium
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Explain how silicon (Si) cycling in soil affects crop health and nutrient uptake, particularly in rice and sugarcane. Why is silicon not classified as an essential nutrient for most plants, yet its deficiency significantly reduces yields in certain crops? How do soil processes control silicon availability, and how does intensive cropping deplete plant-available silicon?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should explain: Si exists in soil as monosilicic acid Si(OH)4, released by weathering of silicate minerals; taken up by rice, sugarcane, wheat as Si(OH)4 via aquaporin-like transporters; deposited as phytoliths (amorphous SiO2) in cell walls; not classified as essential because most plants complete life cycle without it, but 'beneficial element'; in rice, Si strengthens cell walls (disease resistance against blast, sheath blight), improves lodging resistance, reduces transpiration, alleviates Fe and Mn toxicity in flooded soils; Si-accumulating crops remove 100-500 kg SiO2/ha/year; continuous cultivation depletes plant-available Si pool; paddy soils in Japan, Korea, Louisiana show Si depletion after decades of cropping; slag silicates applied as Si fertilizer in many countries; phytolith cycling: plant Si returns to soil through residue decomposition but if residues removed or burned, Si is exported; in highly weathered tropical soils, native silicates already depleted by intense weathering."
    tags: [silicon, rice, sugarcane, beneficial_elements, nutrient_cycling, phytoliths]
