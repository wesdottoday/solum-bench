          Explain the nitrogen cycle in a compost heap, from the initial raw materials through to finished compost. Why does a poorly managed compost pile lose up to 50% of its initial nitrogen, and what management practices minimize these losses? Include the specific forms of nitrogen (NH3, NH4+, NO3-, N2O, N2, organic N) at each stage.
