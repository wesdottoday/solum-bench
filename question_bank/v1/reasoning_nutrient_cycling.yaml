        content: |
          Explain why soil pH is sometimes called the "master variable" for nutrient availability. Describe how pH affects the availability of nitrogen, phosphorus, potassium, calcium, magnesium, and iron, and identify the pH range where the greatest number of nutrients are simultaneously available to plants.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should explain: pH controls the solubility, adsorption, and speciation of nearly every nutrient; N: nitrification (NH4+ to NO3-) optimal at pH 6-8, below pH 5.5 it slows dramatically; P: maximum availability at pH 6.0-7.0 (below 6.0 fixed by Al/Fe, above 7.0 by Ca); K: relatively unaffected by pH directly but low pH and high Al displaces K from exchange sites; Ca and Mg: abundant at neutral to alkaline pH, leached in acidic conditions; Fe, Mn, Zn, Cu: increasingly available as pH decreases (can become toxic below pH 4.5); Mo: opposite pattern, more available at higher pH; B: optimal at pH 5-7; the ideal range of pH 6.0-7.0 is where the most nutrients overlap in their availability windows; this is why liming acidic soils and acidifying alkaline soils both improve nutrient availability; soil-specific factors modify these generalizations."
    tags: [soil_ph, nutrient_availability, master_variable, liming, soil_chemistry]

