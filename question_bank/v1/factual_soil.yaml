  - id: factual_soil_0056
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          Which of the following correctly describes the relationship between iron and manganese availability and soil redox conditions?
    choices:
      - "A) Both Fe and Mn become more available under oxidizing conditions"
      - "B) Fe2+ and Mn2+ (soluble, plant-available forms) are produced under reducing (waterlogged) conditions as Eh decreases"
      - "C) Iron is reduced before manganese as soils become waterlogged"
      - "D) Redox potential has no effect on Fe or Mn availability"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Under reducing conditions: MnO2 is reduced to Mn2+ at Eh ~200 mV, Fe(OH)3 to Fe2+ at Eh ~100-120 mV. Mn is reduced first (higher Eh). Both become toxic at high concentrations in flooded soils. Option C reverses the order."
    tags: [iron, manganese, redox, soil_chemistry, waterlogged_soils]

