  - id: factual_soil_0059
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Answer concisely."
    turns:
      - role: user
        content: |
          What is the Fe-Mn antagonism in soil nutrient uptake, and under what soil conditions does it become agronomically significant?
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["iron", "manganese", "competition"]
      rubric_criteria:
        - name: mechanism
          description: "Explains that Fe2+ and Mn2+ compete for the same root membrane transporters (IRT1 transporter family), so excess of one inhibits uptake of the other"
          max_points: 3
        - name: conditions
          description: "Identifies conditions where this is significant: waterlogged/reduced soils with high Mn2+ suppressing Fe uptake, or heavily limed soils where both become less available but at different rates"
          max_points: 3
        - name: crop_impact
          description: "Notes practical examples such as Mn toxicity in acidic waterlogged soils or Mn-induced Fe deficiency in certain crops"
          max_points: 2
    source_notes: "Fe-Mn antagonism is bidirectional. In flooded rice paddies, excess Mn2+ can inhibit Fe uptake. In calcareous soils, both are poorly available but liming can differentially affect their availability. The IRT1 transporter accepts both Fe2+ and Mn2+ (Korshunova et al., 1999)."
    tags: [iron, manganese, nutrient_antagonism, micronutrients, waterlogged_soils]

  - id: factual_soil_0060
    question_type: short_answer
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Answer concisely."
    turns:
      - role: user
        content: |
          Explain why AMF (arbuscular mycorrhizal fungi) colonization rates are typically lower in heavily fertilized agricultural soils compared to low-input or natural systems. Describe the physiological and ecological mechanisms involved.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["phosphorus", "colonization", "carbon"]
      rubric_criteria:
        - name: carbon_allocation
          description: "Explains that plants reduce carbon allocation to AMF when nutrients (especially P) are abundant because the cost-benefit ratio of the symbiosis shifts; plants invest photosynthate in fungal partners only when nutrient limitation makes it worthwhile"
          max_points: 3
        - name: phosphorus_mechanism
          description: "Notes that high soil P suppresses strigolactone exudation by roots, which is the key signaling molecule that stimulates AMF hyphal branching and colonization"
          max_points: 3
        - name: tillage_and_inputs
          description: "Mentions that tillage physically disrupts hyphal networks and high N fertilization can also reduce colonization by altering plant C:N allocation"
          max_points: 2
        - name: ecological_consequences
          description: "Notes consequences: loss of AMF-mediated benefits including soil aggregation (glomalin), extended nutrient foraging, drought tolerance, and pathogen protection"
          max_points: 2
    source_notes: "AMF colonization decreases with increasing P fertility (Smith & Read, 2008). Plants regulate the symbiosis via strigolactone signaling (Akiyama et al., 2005). High P suppresses SL biosynthesis, reducing pre-symbiotic fungal growth. This is a functional trade-off: maintaining AMF costs 4-20% of photosynthate."
    tags: [amf, mycorrhizae, phosphorus, colonization, soil_biology, agricultural_intensification]
