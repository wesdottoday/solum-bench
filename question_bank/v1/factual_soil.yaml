    choices:
      - "A) Nitrogen and sulfur (synergistic in protein synthesis)"
      - "B) Excess calcium inhibiting magnesium uptake by competing for the same root membrane transporters"
      - "C) Phosphorus enhancing nitrogen fixation in legumes"
