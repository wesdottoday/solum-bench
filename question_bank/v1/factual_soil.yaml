metadata:
  category: factual
  subcategory: soil_science
  version: v1

questions:
  - id: factual_soil_0001
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          What does a soil pH of 4.5 indicate?
    choices:
      - "A) Strongly alkaline soil"
      - "B) Neutral soil"
      - "C) Strongly acidic soil"
      - "D) Slightly acidic soil"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Basic soil chemistry. pH 4.5 is strongly acidic (below 5.0 threshold)."
    tags: [ph, fundamentals]

  - id: factual_soil_0002
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          Which soil texture class has the highest water-holding capacity?
    choices:
      - "A) Sand"
      - "B) Clay"
      - "C) Silt loam"
      - "D) Loamy sand"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Clay has the highest water-holding capacity due to small particle size and large surface area."
    tags: [texture, water_holding_capacity, fundamentals]

  - id: factual_soil_0003
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          What does CEC (Cation Exchange Capacity) measure in soil?
    choices:
      - "A) The soil's ability to conduct electricity"
      - "B) The soil's ability to hold and exchange positively charged nutrient ions"
      - "C) The total carbon content of the soil"
      - "D) The rate of water infiltration through the soil"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "CEC measures the soil's capacity to hold cations (Ca2+, Mg2+, K+, Na+, H+, Al3+) on negatively charged clay and organic matter surfaces."
    tags: [cec, fundamentals, nutrient_management]

  - id: factual_soil_0004
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          A soil test shows a CEC of 5.2 cmol(c)/kg in a sandy loam. How would you classify this CEC value?
    choices:
      - "A) Very high"
      - "B) High"
      - "C) Moderate"
      - "D) Low"
    correct_answer: "D"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "D"
    source_notes: "CEC ranges: <10 = low (sandy soils), 10-25 = moderate, 25-40 = high (clay/organic), >40 = very high. 5.2 in sandy loam is low but expected for that texture."
    tags: [cec, soil_testing, sandy_soils]

  - id: factual_soil_0005
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          What is the ideal C:N ratio range for rapid decomposition of organic matter in soil?
    choices:
      - "A) 5:1 to 10:1"
      - "B) 20:1 to 25:1"
      - "C) 50:1 to 60:1"
      - "D) 80:1 to 100:1"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "C:N of 20-25:1 is the sweet spot for decomposition. Below 20:1, excess N is mineralized. Above 30:1, microbes immobilize soil N to decompose carbon."
    tags: [cn_ratio, decomposition, organic_matter]

  - id: factual_soil_0006
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          Which soil order is characterized by a dark, organic-matter-rich surface horizon (mollic epipedon) and is typically found in grassland ecosystems?
    choices:
      - "A) Ultisols"
      - "B) Mollisols"
      - "C) Oxisols"
      - "D) Spodosols"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Mollisols are defined by their mollic epipedon (thick, dark, high base saturation). They dominate the Great Plains and are among the most fertile soils globally."
    tags: [taxonomy, soil_orders, grasslands]

  - id: factual_soil_0007
    question_type: mcq
    difficulty: hard
    regions: [global]
    turns:
      - role: user
        content: |
          In the USDA soil texture triangle, a soil with 35% sand, 30% silt, and 35% clay falls into which texture class?
    choices:
      - "A) Clay loam"
      - "B) Sandy clay loam"
      - "C) Silty clay loam"
      - "D) Clay"
    correct_answer: "A"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "A"
    source_notes: "35% sand, 30% silt, 35% clay places squarely in clay loam on the USDA texture triangle (20-45% sand, 15-55% silt, 27-40% clay)."
    tags: [texture_triangle, texture_class, soil_analysis]

  - id: factual_soil_0008
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          What is the primary role of mycorrhizal fungi in soil?
    choices:
      - "A) Decomposing dead plant material"
      - "B) Fixing atmospheric nitrogen"
      - "C) Extending plant root systems to access water and nutrients, especially phosphorus"
      - "D) Breaking down rock into mineral particles"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Mycorrhizae form symbiotic associations with ~90% of plant species, extending hyphal networks that dramatically increase phosphorus and water uptake."
    tags: [mycorrhizae, soil_biology, phosphorus]

  - id: factual_soil_0009
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          Bulk density of a soil sample is measured at 1.65 g/cm³. What does this suggest about the soil?
    choices:
      - "A) The soil is highly porous with excellent structure"
      - "B) The soil is likely compacted with restricted root growth"
      - "C) The soil has very high organic matter content"
      - "D) The soil is waterlogged"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Bulk density >1.6 g/cm³ indicates compaction in most mineral soils. Root-limiting thresholds: 1.4 for clay, 1.6 for silt loam, 1.8 for sandy soils."
    tags: [bulk_density, compaction, soil_physics]

  - id: factual_soil_0010
    question_type: mcq
    difficulty: hard
    regions: [global]
    turns:
      - role: user
        content: |
          What percentage of soil organic matter (SOM) is approximately equal to 1% soil organic carbon (SOC)?
    choices:
      - "A) 0.58%"
      - "B) 1.0%"
      - "C) 1.72%"
      - "D) 2.5%"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "The Van Bemmelen factor: SOM = SOC × 1.724 (since SOM is ~58% carbon). So 1% SOC ≈ 1.72% SOM."
    tags: [organic_matter, organic_carbon, van_bemmelen, conversions]

  - id: factual_soil_0011
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Answer concisely."
    turns:
      - role: user
        content: |
          What are the three primary soil macronutrients, and what is their standard order in a fertilizer grade label (e.g., 10-10-10)?
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["nitrogen", "phosphorus", "potassium"]
      rubric_criteria:
        - name: correct_elements
          description: "Names all three: nitrogen (N), phosphorus (P), potassium (K)"
          max_points: 3
        - name: correct_order
          description: "States the correct order: N-P-K"
          max_points: 2
    source_notes: "N-P-K is the universal fertilizer grade order. P is expressed as P2O5 and K as K2O in fertilizer labels."
    tags: [npk, nutrients, fertilizer, fundamentals]

  - id: factual_soil_0012
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          Which process converts ammonium (NH4+) to nitrate (NO3-) in soil?
    choices:
      - "A) Denitrification"
      - "B) Nitrogen fixation"
      - "C) Nitrification"
      - "D) Ammonification"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Nitrification is the two-step aerobic process: NH4+ → NO2- (by Nitrosomonas) → NO3- (by Nitrobacter). Requires oxygen and is pH-sensitive."
    tags: [nitrogen_cycle, nitrification, soil_biology]

  - id: factual_soil_0013
    question_type: mcq
    difficulty: hard
    regions: [global]
    turns:
      - role: user
        content: |
          At approximately what soil pH range is phosphorus most available to plants?
    choices:
      - "A) 4.0 to 5.0"
      - "B) 6.0 to 7.0"
      - "C) 7.5 to 8.5"
      - "D) 8.5 to 9.5"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Phosphorus availability peaks at pH 6.0-7.0. Below 6, P binds with iron and aluminum. Above 7.5, P binds with calcium. This is a classic nutrient availability chart concept."
    tags: [phosphorus, ph, nutrient_availability]

  - id: factual_soil_0014
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Answer concisely."
    turns:
      - role: user
        content: |
          Explain the difference between soil structure and soil texture.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["particle", "aggregate"]
      rubric_criteria:
        - name: texture_definition
          description: "Defines texture as the proportion of sand, silt, and clay particles (inherent, cannot be changed)"
          max_points: 3
        - name: structure_definition
          description: "Defines structure as how particles aggregate into peds/clumps (can be improved through management)"
          max_points: 3
        - name: management_distinction
          description: "Notes that texture is inherent while structure can be modified"
          max_points: 2
    source_notes: "Texture = mineral particle size distribution (permanent). Structure = arrangement of particles into aggregates (manageable). Critical distinction for farmers."
    tags: [texture, structure, fundamentals]

  - id: factual_soil_0015
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          What is the typical pH range of most agricultural soils?
    choices:
      - "A) 2.0 to 4.0"
      - "B) 4.0 to 5.0"
      - "C) 5.5 to 7.5"
      - "D) 8.5 to 10.0"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Most crops grow best in pH 5.5-7.5. Some exceptions exist (blueberries prefer 4.5-5.5, alfalfa prefers 6.5-7.5)."
    tags: [ph, agriculture, fundamentals]

  - id: factual_soil_0016
    question_type: mcq
    difficulty: hard
    regions: [global]
    turns:
      - role: user
        content: |
          What is the approximate weight of one acre-furrow-slice of soil (top 6.67 inches / 17 cm) in tons?
    choices:
      - "A) 500 tons"
      - "B) 1,000 tons"
      - "C) 2,000 tons"
      - "D) 5,000 tons"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "An acre-furrow-slice weighs approximately 2,000,000 lbs (2,000 tons or ~1,000 tonnes). This is the standard reference for converting ppm soil test results to lbs/acre."
    tags: [acre_furrow_slice, conversions, soil_testing]

  - id: factual_soil_0017
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Answer concisely."
    turns:
      - role: user
        content: |
          Name the six master soil horizons in order from the surface downward.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["O", "A", "E", "B", "C", "R"]
      rubric_criteria:
        - name: all_horizons
          description: "Lists all six: O (organic), A (topsoil), E (eluviation), B (subsoil/illuviation), C (parent material), R (bedrock)"
          max_points: 3
        - name: correct_order
          description: "Lists them in the correct top-to-bottom order: O, A, E, B, C, R"
          max_points: 2
        - name: brief_descriptions
          description: "Provides brief descriptions of at least 3 horizons"
          max_points: 2
    source_notes: "O-A-E-B-C-R is the standard horizon sequence. Not all horizons are present in every soil profile."
    tags: [horizons, soil_profile, fundamentals]

  - id: factual_soil_0018
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          Which of the following best describes the role of earthworms in soil health?
    choices:
      - "A) They primarily consume living plant roots"
      - "B) They create macropores, mix organic matter into soil, and improve aggregation through their casts"
      - "C) They fix atmospheric nitrogen in symbiosis with legumes"
      - "D) They primarily break down mineral rock into clay particles"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Earthworms are ecosystem engineers: their burrowing creates macropores (improving infiltration and aeration), their casts are rich in plant-available nutrients, and they mix organic residues into the profile (bioturbation)."
    tags: [earthworms, soil_biology, soil_health]

  - id: factual_soil_0019
    question_type: mcq
    difficulty: hard
    regions: [global]
    turns:
      - role: user
        content: |
          Soil aggregation is primarily driven by which of the following binding agents?
    choices:
      - "A) Sand particles and gravel"
      - "B) Glomalin (produced by mycorrhizal fungi), polysaccharides from bacteria, and root exudates"
      - "C) Calcium carbonate precipitates only"
      - "D) Iron oxide coatings only"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Soil aggregation hierarchy: microaggregates bound by persistent organic compounds and clay-polyvalent cation-organic matter complexes; macroaggregates bound by fungal hyphae, fine roots, glomalin, and transient polysaccharides."
    tags: [aggregation, glomalin, mycorrhizae, soil_biology, soil_structure]

  - id: factual_soil_0020
    question_type: short_answer
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Answer concisely but thoroughly."
    turns:
      - role: user
        content: |
          A soil test report shows the following base saturation percentages: Ca 55%, Mg 18%, K 4%, Na 1%, H+ and Al3+ 22%. What does this indicate about the soil's fertility status, and what is the approximate base saturation percentage?
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["base saturation"]
      rubric_criteria:
        - name: base_saturation_calc
          description: "Correctly calculates base saturation as ~78% (Ca+Mg+K+Na = 55+18+4+1 = 78%)"
          max_points: 3
        - name: fertility_interpretation
          description: "Interprets 78% base saturation as moderately high, indicating reasonable fertility"
          max_points: 2
        - name: ca_mg_ratio
          description: "Notes the Ca:Mg ratio (~3:1) which is within acceptable range (3:1 to 5:1 ideal)"
          max_points: 2
        - name: acidity_note
          description: "Notes the 22% acid saturation (H+ and Al3+) suggests moderate acidity, may benefit from liming"
          max_points: 2
    source_notes: "Base saturation = (sum of base cations / CEC) × 100. At 78%, this soil has good base status but the acid saturation suggests pH around 5.5-6.0."
    tags: [base_saturation, cec, fertility, soil_testing, liming]

  - id: factual_soil_0021
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          Which clay mineral is dominant in highly weathered tropical Oxisols of the Brazilian Cerrado and Congo Basin?
    choices:
      - "A) Montmorillonite (smectite)"
      - "B) Illite"
      - "C) Kaolinite"
      - "D) Vermiculite"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Oxisols are dominated by kaolinite (1:1 clay) and iron/aluminum oxides (goethite, hematite, gibbsite). Intense weathering removes 2:1 clays, leaving low-CEC kaolinite."
    tags: [oxisols, tropical_soils, clay_mineralogy, brazil, congo]

  - id: factual_soil_0022
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          In tropical Oxisols, aluminum toxicity becomes a growth-limiting factor for most crops when exchangeable Al saturation exceeds approximately what percentage?
    choices:
      - "A) 5%"
      - "B) 20%"
      - "C) 60%"
      - "D) 90%"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Most tropical crops experience Al toxicity when Al saturation exceeds 60% of effective CEC. Tolerant species like tea can withstand higher levels. Critical threshold varies by crop but 60% is the widely cited general benchmark."
    tags: [aluminum_toxicity, oxisols, tropical_soils, cec]

  - id: factual_soil_0023
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          Vertisols, common in the Deccan Plateau of India and the Gezira region of Sudan, exhibit pronounced shrink-swell behavior. Which clay mineral is primarily responsible for this property?
    choices:
      - "A) Kaolinite"
      - "B) Halloysite"
      - "C) Smectite (montmorillonite)"
      - "D) Chlorite"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Smectite clays (2:1 expanding lattice) absorb water between layers, causing Vertisols to swell when wet and crack deeply (often >1 m) when dry. The Deccan Plateau black cotton soils and Sudan Gezira clays are classic examples."
    tags: [vertisols, shrink_swell, smectite, india, sudan, clay_mineralogy]

  - id: factual_soil_0024
    question_type: short_answer
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Answer concisely."
    turns:
      - role: user
        content: |
          Explain why Vertisols develop gilgai microrelief and describe the self-mulching process that occurs in these soils.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["shrink", "swell", "crack"]
      rubric_criteria:
        - name: gilgai_definition
          description: "Describes gilgai as the undulating micro-topography (mounds and depressions) formed by repeated cycles of swelling and shrinking"
          max_points: 3
        - name: self_mulching
          description: "Explains that surface material falls into deep desiccation cracks and is incorporated at depth when the soil re-wets and swells, creating pedoturbation"
          max_points: 3
        - name: clay_mechanism
          description: "Links the behavior to high smectite clay content (>30%) and its 2:1 expanding lattice structure"
          max_points: 2
    source_notes: "Gilgai form because differential swelling pressures push soil upward. Self-mulching occurs as surface aggregates fall into cracks during dry periods, then are buried when the soil swells shut. This creates an inverted soil profile over time."
    tags: [vertisols, gilgai, self_mulching, pedoturbation, shrink_swell]

  - id: factual_soil_0025
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          What is the primary mineral responsible for the unique properties of Andisols, which are commonly found in volcanic regions of Japan, Ecuador, and the Pacific Northwest?
    choices:
      - "A) Quartz"
      - "B) Feldspar"
      - "C) Allophane"
      - "D) Calcite"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Allophane is a short-range-order aluminosilicate mineral that gives Andisols their distinctive properties: low bulk density, high water retention, thixotropy, and extremely high phosphorus fixation capacity."
    tags: [andisols, allophane, volcanic_soils, japan, ecuador]

  - id: factual_soil_0026
    question_type: mcq
    difficulty: hard
    regions: [global]
    turns:
      - role: user
        content: |
          Andisols can fix phosphorus at rates far exceeding most other soil orders. What is the primary mechanism of P fixation in allophanic Andisols?
    choices:
      - "A) Precipitation as calcium phosphate at high pH"
      - "B) Ligand exchange where phosphate replaces hydroxyl groups on reactive Al and Fe surfaces of allophane and ferrihydrite"
      - "C) Incorporation into silicate crystal lattices"
      - "D) Biological immobilization by fungal hyphae"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Allophane and ferrihydrite have enormous reactive surface areas with abundant Al-OH and Fe-OH groups. Phosphate displaces hydroxyl groups via ligand exchange, forming inner-sphere complexes that are nearly irreversible. Andisols can fix >2000 mg P/kg soil."
    tags: [andisols, phosphorus_fixation, allophane, ligand_exchange]

  - id: factual_soil_0027
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          A soil is classified as sodic when the Exchangeable Sodium Percentage (ESP) exceeds which threshold value?
    choices:
      - "A) 5%"
      - "B) 15%"
      - "C) 30%"
      - "D) 50%"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "USDA Salinity Lab (Richards, 1954): sodic soil ESP >15%, pH typically >8.5, ECe <4 dS/m. High Na+ on exchange sites causes clay dispersion and severe structural degradation."
    tags: [sodic_soils, esp, salinity, soil_chemistry]

  - id: factual_soil_0028
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          According to USDA salinity classification, a saline soil is defined by an electrical conductivity of the saturated paste extract (ECe) greater than what value?
    choices:
      - "A) 1 dS/m"
      - "B) 2 dS/m"
      - "C) 4 dS/m"
      - "D) 8 dS/m"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Saline soils: ECe >4 dS/m, ESP <15, pH <8.5. Saline-sodic: ECe >4, ESP >15. Sodic: ECe <4, ESP >15. The 4 dS/m threshold was established by the USDA Salinity Laboratory (Handbook 60, 1954)."
    tags: [saline_soils, electrical_conductivity, salinity_classification]

  - id: factual_soil_0029
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Answer concisely."
    turns:
      - role: user
        content: |
          What is the Sodium Adsorption Ratio (SAR), and why is it important for irrigation water quality assessment?
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["sodium", "calcium", "magnesium"]
      rubric_criteria:
        - name: formula
          description: "Provides the formula: SAR = Na+ / sqrt((Ca2+ + Mg2+) / 2), with concentrations in mmol/L"
          max_points: 3
        - name: interpretation
          description: "Explains that high SAR irrigation water introduces excess sodium relative to divalent cations, leading to sodification of soils"
          max_points: 2
        - name: structural_impact
          description: "Notes that high SAR causes clay dispersion, reduced infiltration, and soil structural degradation"
          max_points: 2
    source_notes: "SAR predicts the sodicity hazard of irrigation water. SAR >13 is generally considered a high sodium hazard. SAR interacts with ECe in determining the risk of soil structural deterioration."
    tags: [sar, irrigation, sodic_soils, water_quality]

  - id: factual_soil_0030
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          In the Munsell color notation system used for soil description, what do the three components hue, value, and chroma represent?
    choices:
      - "A) Hue = lightness, Value = spectral color, Chroma = saturation"
      - "B) Hue = spectral color, Value = lightness (light to dark), Chroma = color intensity/saturation"
      - "C) Hue = saturation, Value = spectral color, Chroma = lightness"
      - "D) Hue = texture, Value = moisture, Chroma = organic matter content"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
