    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Ca-Mg antagonism is a classic cation competition. Excess Ca2+ inhibits Mg2+ uptake because both are divalent cations competing for the same nonselective cation channels in root cell membranes. Ca:Mg >5:1 can induce Mg deficiency even when soil Mg is adequate."
