          description: "Notes that significant AEC in subsurface horizons of Oxisols can retard nitrate leaching, an effect largely absent in temperate soils with permanent negative charge"
          max_points: 3
    source_notes: "Subsoil AEC in Brazilian Oxisols can reach 2-5 cmol(c)/kg at pH 4.0-4.5 due to goethite, hematite, and gibbsite surfaces. This electrostatic NO3- retention is agronomically significant and is not captured by standard temperate-soil models (Dynia, 2000)."
    tags: [anion_exchange, aec, oxisols, nitrate_leaching, variable_charge, tropical_soils]

