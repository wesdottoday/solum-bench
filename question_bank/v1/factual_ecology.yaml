  - id: factual_ecology_0034
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          In managed grazing systems, what does 'adaptive multi-paddock' (AMP) grazing aim to mimic from natural grassland ecology?
    choices:
      - "A) The constant, year-round grazing pressure of wild herbivores"
      - "B) The pattern of intense but brief grazing by large herds followed by long recovery periods, as seen with migratory herbivore herds on the African savanna or North American bison"
      - "C) The selective feeding behavior of browsers that only eat woody plants"
      - "D) The fire regimes that historically maintained grasslands"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "AMP grazing (also called mob grazing, management-intensive rotational grazing) concentrates livestock at high density for short periods (1–3 days) followed by long rest (30–90+ days). This mimics the intense-then-rest pattern of wild herds moved by predators."
    tags: [grazing, adaptive_multi_paddock, grassland, rotational_grazing]

