  - id: factual_ecology_0036
    question_type: short_answer
    difficulty: hard
    regions: [helsinki]
    system_prompt: "You are a soil science expert. Answer concisely."
    turns:
      - role: user
        content: |
          In boreal forest ecosystems near Helsinki, Finland, ectomycorrhizal (EM) fungi dominate. Explain why EM fungi are more prevalent than arbuscular mycorrhizal (AM) fungi in boreal forests, and describe one key functional difference between EM and AM nutrient acquisition strategies.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["ectomycorrhizal", "boreal"]
      rubric_criteria:
        - name: dominance_explanation
          description: "Explains that EM fungi dominate because boreal forests are dominated by EM-associated tree species (Betula/birch, Pinus/pine, Picea/spruce) and because EM fungi are better adapted to acidic, organic-matter-rich, nutrient-poor boreal soils"
          max_points: 3
        - name: functional_difference
          description: "Describes a key functional difference: EM fungi can directly decompose organic matter and access organic nitrogen via enzymatic activity (saprotrophic capability), while AM fungi primarily access inorganic mineral nutrients (especially phosphorus)"
          max_points: 3
        - name: ecological_significance
          description: "Notes the ecological significance: in nutrient-poor boreal soils where most N and P are locked in organic forms, EM fungi's ability to 'short-circuit' the decomposition pathway by directly mining organic matter gives them a competitive advantage"
          max_points: 2
    source_notes: "EM fungi produce extracellular enzymes (proteases, phosphatases) that can mobilize N and P directly from organic matter (Lindahl et al., 2007, New Phytologist). This 'mycorrhizal pathway' of nutrient cycling is dominant in boreal forests where organic horizons are thick and decomposition is slow."
    tags: [ectomycorrhizae, boreal, helsinki, nutrient_acquisition, organic_matter]

