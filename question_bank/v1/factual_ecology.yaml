        content: |
          In the humid continental climate of Ohio, which cover crop practice is most effective at reducing nitrate leaching to groundwater over winter?
    choices:
      - "A) Leaving fields bare after harvest to freeze and thaw the soil"
      - "B) Planting a winter-active cover crop like cereal rye to take up residual soil nitrogen"
      - "C) Tilling the soil after harvest to incorporate crop residues"
      - "D) Applying additional nitrogen fertilizer in the fall"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Cereal rye planted after corn or soybean harvest scavenges 20–60 kg N/ha of residual soil nitrate, reducing over-winter leaching by 40–70%. This is critical in Ohio's Lake Erie watershed to reduce harmful algal blooms."
    tags: [cover_crops, cereal_rye, nitrate_leaching, ohio, water_quality]

  - id: factual_ecology_0030
    question_type: mcq
    difficulty: medium
    regions: [canterbury_nz]
    turns:
      - role: user
        content: |
          In Canterbury, New Zealand, intensive dairy farming has raised concerns about waterway degradation. Which ecological process is most responsible for nitrate contamination of groundwater in the Canterbury Plains' alluvial gravel aquifer system?
    choices:
      - "A) Surface runoff of granular fertilizer directly into rivers"
      - "B) Leaching of nitrate below the root zone through the highly permeable alluvial gravels, especially from urine patches in grazed pastures"
      - "C) Atmospheric deposition of ammonia from dairy sheds"
      - "D) Erosion of nitrogen-rich topsoil into waterways"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Canterbury's alluvial gravel aquifers are highly permeable. Dairy cow urine patches deposit N at rates equivalent to 1,000 kg N/ha locally, far exceeding plant uptake. This leaches rapidly through gravels to groundwater. Nitrate-N levels in some Canterbury wells exceed 11.3 mg/L drinking water standard."
    tags: [canterbury_nz, nitrate_leaching, dairy, groundwater, ecology]

  - id: factual_ecology_0031
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Answer concisely."
    turns:
      - role: user
        content: |
          What is the 'push-pull' system developed for smallholder maize farming in East Africa? Describe its ecological principles and name the specific companion plants used.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["push", "pull", "Desmodium"]
      rubric_criteria:
        - name: concept
          description: "Explains push-pull as a companion planting system that repels (pushes) pests away from the crop and attracts (pulls) them to trap plants"
          max_points: 2
        - name: push_plant
          description: "Identifies Desmodium (silverleaf or greenleaf) as the push plant intercropped between maize rows, which repels stemborers and suppresses Striga weed through allelopathy"
          max_points: 3
        - name: pull_plant
          description: "Identifies Napier grass (Pennisetum purpureum) or Brachiaria grass planted as a border trap crop that attracts stemborers away from maize"
          max_points: 3
    source_notes: "Push-pull (Khan et al., icipe) uses Desmodium intercrop (repels stemborers via volatile chemicals, suppresses Striga via root exudates) and Napier/Brachiaria border (attracts stemborers, which are killed by plant gum). Also fixes nitrogen and provides livestock fodder. Adopted by >250,000 farmers."
