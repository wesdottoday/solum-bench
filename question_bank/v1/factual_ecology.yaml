    source_notes: "The tallgrass-shortgrass gradient follows the precipitation gradient across the Great Plains. Tallgrass (big bluestem, switchgrass) in the wetter east (750–1,000 mm); shortgrass (blue grama, buffalo grass) in the drier west (250–500 mm). Mixed-grass prairie in between."
