        content: |
          Explain how the 'insurance hypothesis' of biodiversity relates to agricultural resilience. Why might a polyculture or diverse cover crop mixture be more resilient than a monoculture?
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["diversity", "resilience"]
      rubric_criteria:
        - name: insurance_hypothesis
          description: "Explains the insurance hypothesis: higher biodiversity provides a buffer against environmental fluctuations because different species respond differently to stresses, so some will perform well when others do not"
          max_points: 3
        - name: agricultural_application
          description: "Applies this to agriculture: polycultures or diverse cover crop mixtures maintain productivity across variable conditions because different species fill in functional gaps under different weather, pest, or soil conditions"
          max_points: 3
        - name: specific_example
          description: "Provides a specific example (e.g., a multi-species cover crop mix where legumes provide N when warm, brassicas grow in cool conditions, and grasses provide erosion control; or intercropping where one crop compensates for another's failure)"
          max_points: 2
    source_notes: "Insurance hypothesis (Yachi & Loreau, 1999): biodiversity insures ecosystems against decline by increasing the probability that some species maintain functioning under changing conditions. Applied to agriculture: diverse cover crop mixes (8–12 species) show more stable biomass production across years than monocultures."
    tags: [insurance_hypothesis, biodiversity, resilience, polyculture, cover_crops]

  - id: factual_ecology_0040
    question_type: mcq
    difficulty: hard
    regions: [mato_grosso, nairobi]
    turns:
      - role: user
        content: |
          Tropical soils in both the Cerrado (Mato Grosso) and East African highlands (near Nairobi) are often deeply weathered. Despite this similarity, their soil food web dynamics differ. What is a key ecological difference in decomposer activity between these two tropical agricultural zones?
    choices:
      - "A) Decomposer communities are identical in all tropical soils"
      - "B) The Cerrado's prolonged dry season (5 months) dramatically slows decomposition seasonally, creating a pulse of nutrient release at wet season onset; while Nairobi's bimodal rainfall supports more continuous year-round decomposition"
      - "C) Nairobi soils have no fungal decomposers due to high elevation"
      - "D) Cerrado soils lack earthworms entirely"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Cerrado (Aw climate) has a 5-month dry season where microbial activity plummets, creating litter accumulation and a nutrient flush with first rains. Nairobi's highland climate (Cwb) with bimodal rains (March-May, Oct-Dec) supports more continuous decomposition, though with seasonal variation."
    tags: [decomposers, tropical, cerrado, nairobi, seasonal_dynamics, nutrient_cycling]
