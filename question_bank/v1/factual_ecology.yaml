  - id: factual_ecology_0032
    question_type: mcq
    difficulty: hard
    regions: [global]
    turns:
      - role: user
        content: |
          White-rot fungi (e.g., Phanerochaete chrysosporium) are unique among soil decomposers because they are capable of:
    choices:
      - "A) Fixing atmospheric nitrogen symbiotically with tree roots"
      - "B) Enzymatically degrading lignin using lignin peroxidase, manganese peroxidase, and laccase, which no other organism can fully decompose"
      - "C) Photosynthesizing in the forest understory"
      - "D) Producing antibiotics that eliminate all soil bacteria"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Only white-rot basidiomycetes can fully mineralize lignin, the second most abundant biopolymer on Earth. They produce extracellular oxidative enzymes (lignin peroxidase, MnP, laccase) that cleave the aromatic rings. Without them, dead wood would not decompose."
    tags: [decomposers, white_rot_fungi, lignin, enzymes]

  - id: factual_ecology_0033
    question_type: mcq
