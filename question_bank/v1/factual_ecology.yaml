    choices:
      - "A) Tallgrass prairies receive more annual precipitation (750–1,000 mm) than shortgrass prairies (250–500 mm)"
      - "B) Shortgrass prairies have deeper soils than tallgrass prairies"
      - "C) Tallgrass prairies are found only in tropical latitudes"
