  - id: grounding_citation_0011
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Base your analysis ONLY on the data provided. Cite specific values."
    context_data: |
      Soil Test Results - Sample ID: US-OH-2024-1134
      Location: Putnam County, Ohio, USA (41.0°N, 84.1°W, 230m elevation)
      Date: November 2024 (post-corn harvest)

      pH (water): 6.8
      Buffer pH: 7.1
      Organic Matter (LOI): 3.1%
      Available Phosphorus (Mehlich-3): 28 mg/kg
      Available Potassium (Mehlich-3): 142 mg/kg
      Calcium: 2,450 mg/kg
      Magnesium: 385 mg/kg
      CEC: 16.8 cmol(c)/kg
      Base Saturation: Ca 73%, Mg 13%, K 2.1%, H 11.9%
      Sulfur (SO4-S): 9 mg/kg
      Zinc: 2.8 mg/kg
      Manganese: 18 mg/kg
      Boron: 0.9 mg/kg
      Texture: Silty clay loam
      Soil Health Indicators:
        Respiration (24h CO2-C): 48 mg/kg
        Active Carbon (POXC): 385 mg/kg
        ACE Protein Index: 6.2
        Wet Aggregate Stability: 38%
    turns:
      - role: user
        content: |
          Review this comprehensive Ohio soil test including the soil health indicators.
          How do the biological health metrics compare to the chemical fertility data?
          What does this combination tell you about the farm's management history, and
          what changes would you recommend?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        pH: 6.8
        organic_matter: 3.1
        phosphorus: 28.0
        potassium: 142.0
        respiration: 48.0
        POXC: 385.0
        aggregate_stability: 38.0
        ace_protein: 6.2
      dimensions:
        - data_grounding
        - citation_fidelity
        - factual_accuracy
