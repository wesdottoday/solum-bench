  - id: grounding_citation_0008
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Base your analysis ONLY on the data provided. Cite specific values."
    context_data: |
      Soil Test Results - Sample ID: FI-UUS-2024-0188
      Location: Sipoo, Uusimaa Region, Finland (60.4°N, 25.3°E, 15m elevation)
      Date: May 2024 (spring, post-snowmelt)

      pH (water): 5.4
      pH (CaCl2): 4.8
      Organic Carbon: 3.2%
      Total Nitrogen: 0.28%
      C:N Ratio: 11.4
      Available Phosphorus (ammonium acetate pH 4.65): 6.8 mg/L
      Available Potassium: 95 mg/L
      Exchangeable Ca: 980 mg/L
      Exchangeable Mg: 125 mg/L
      Reserve Potassium (HCl): 1,450 mg/L
      Conductivity: 1.2 mS/cm
      Texture: Fine sandy loam (glacial till derived)
      Soil Type: Haplic Podzol
      Topsoil Depth: 22 cm (shallow A horizon over E horizon)
    turns:
      - role: user
        content: |
          Interpret this Finnish boreal soil test using Finnish soil testing conventions.
          Assess fertility for spring barley production. What are the key limitations,
          and what liming and fertilization strategy would you recommend?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        pH_water: 5.4
        pH_CaCl2: 4.8
        organic_carbon: 3.2
        phosphorus: 6.8
        potassium: 95.0
        cn_ratio: 11.4
        calcium: 980.0
        topsoil_depth: 22.0
      dimensions:
        - data_grounding
        - citation_fidelity
        - factual_accuracy
        - practical_actionability
    source_notes: "Must use Finnish classification: P at 6.8 mg/L is 'huononlainen' (poor) class in Finnish system (need >10 for 'tyydyttava'/satisfactory), K at 95 is 'valttava' (passable). pH 5.4 needs liming for barley (target 6.0-6.2). C:N at 11.4 indicates good N mineralization potential. Podzol with shallow A horizon limits rooting. Finnish conventions use mg/L (volume-based) not mg/kg. Reference Eurofins Viljavuuspalvelu soil fertility classes."
    tags: [soil_testing, data_interpretation, finland, podzol, boreal]

  - id: grounding_citation_0009
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Base your analysis ONLY on the data provided. Cite specific values."
    context_data: |
      Soil Test Results - Sample ID: ES-AND-2024-0445
      Location: Jaen Province, Andalusia, Spain (37.8°N, 3.8°W, 520m elevation)
      Date: November 2024 (pre-olive harvest)

      pH (water): 8.2
      Organic Matter: 1.1%
      Total Nitrogen: 0.08%
      Available Phosphorus (Olsen): 9.5 mg/kg
      Exchangeable K: 0.65 cmol(c)/kg
      Exchangeable Ca: 28.5 cmol(c)/kg
      Exchangeable Mg: 2.8 cmol(c)/kg
      CEC: 22.4 cmol(c)/kg
      Active CaCO3: 12.5%
      Total CaCO3: 35%
      Texture: Clay (48% clay, 28% silt, 24% sand)
      Iron (DTPA): 2.8 mg/kg
      Manganese (DTPA): 3.5 mg/kg
      Water Holding Capacity: 185 mm/m
      Aggregate Stability (wet sieving): 22%
    turns:
      - role: user
        content: |
          Evaluate this Mediterranean calcareous soil from an olive grove in southern
          Spain. What constraints does the high carbonate content create, and how would
          you improve soil health in this olive orchard using regenerative practices?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        pH: 8.2
        organic_matter: 1.1
        active_CaCO3: 12.5
        total_CaCO3: 35.0
        iron: 2.8
        aggregate_stability: 22.0
        phosphorus: 9.5
      dimensions:
        - data_grounding
        - citation_fidelity
        - factual_accuracy
        - practical_actionability
    source_notes: "Must cite active CaCO3 at 12.5% (causes lime-induced chlorosis, immobilizes Fe and Mn), Fe at 2.8 (deficient <4.5), very low OM at 1.1% (bare-soil management tradition in olive groves), poor aggregate stability at 22% (need >40% for good structure). Should recommend cover cropping between olive rows (Mediterranean native species), organic matter additions, foliar Fe chelates (EDDHA for calcareous soils, not EDTA). Reference Andalusian olive grove regenerative initiatives."
    tags: [soil_testing, data_interpretation, spain, mediterranean, calcareous]

