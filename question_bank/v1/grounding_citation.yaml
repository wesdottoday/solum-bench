  # ============================================================
  # SOIL TESTS - AFRICA
  # ============================================================

  - id: grounding_citation_0001
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Base your analysis ONLY on the data provided. Cite specific values."
    context_data: |
      Soil Test Results - Sample ID: KE-NAI-2024-0847
      Location: Kiambu County, Kenya (1.1°S, 36.8°E, 1800m elevation)
      Date: March 2024

      pH (water): 5.2
      Organic Carbon: 2.8%
      Total Nitrogen: 0.24%
      Available Phosphorus (Olsen): 8 mg/kg
      Exchangeable K: 0.42 cmol(c)/kg
      Exchangeable Ca: 3.1 cmol(c)/kg
      Exchangeable Mg: 1.8 cmol(c)/kg
      CEC: 12.4 cmol(c)/kg
      Base Saturation: 43%
      Texture: Clay loam (32% clay, 35% silt, 33% sand)
      Bulk Density: 1.15 g/cm³
    turns:
      - role: user
        content: |
          Analyze this soil test from central Kenya. What are the key limitations,
          and what amendments would you recommend for growing vegetables?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        pH: 5.2
        organic_carbon: 2.8
        phosphorus: 8.0
        CEC: 12.4
        base_saturation: 43.0
      dimensions:
        - data_grounding
        - citation_fidelity
        - factual_accuracy
        - practical_actionability
    source_notes: "Must cite actual pH 5.2 (too acidic for most vegetables), low P at 8 mg/kg (critical deficiency), moderate OC at 2.8%, moderate CEC at 12.4. Should recommend lime to raise pH to 6.0-6.5, P amendment (rock phosphite or TSP), and note good bulk density at 1.15."
    tags: [soil_testing, data_interpretation, kenya]

