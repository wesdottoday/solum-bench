  - id: grounding_citation_0005
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Base your analysis ONLY on the data provided. Cite specific values."
    context_data: |
      Soil Test Results - Sample ID: IN-RAJ-2024-0334
      Location: Jaipur District, Rajasthan, India (26.9°N, 75.8°E, 431m elevation)
      Date: October 2024 (post-monsoon)

      pH (water): 8.4
      EC (Electrical Conductivity): 0.85 dS/m
      Organic Carbon: 0.28%
      Available Nitrogen (alkaline KMnO4): 125 kg/ha
      Available Phosphorus (Olsen): 12.5 kg/ha
      Available Potassium (ammonium acetate): 185 kg/ha
      Exchangeable Ca: 18.5 cmol(c)/kg
      Exchangeable Mg: 4.2 cmol(c)/kg
      Exchangeable Na: 1.8 cmol(c)/kg
      CEC: 28.5 cmol(c)/kg
      ESP (Exchangeable Sodium Percentage): 6.3%
      Free CaCO3: 8.5%
      Texture: Sandy clay loam (55% sand, 18% silt, 27% clay)
      DTPA-extractable micronutrients: Zn 0.42 mg/kg, Fe 3.2 mg/kg, Mn 2.8 mg/kg, Cu 0.85 mg/kg
    turns:
      - role: user
        content: |
          Analyze this Rajasthan soil test. What are the key constraints for wheat
          cultivation in the rabi season, and what amendments would address the nutrient
          deficiencies while respecting the alkaline and calcareous nature of this soil?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        pH: 8.4
        organic_carbon: 0.28
        nitrogen: 125.0
        phosphorus: 12.5
        zinc: 0.42
        iron: 3.2
        CaCO3: 8.5
        ESP: 6.3
      dimensions:
        - data_grounding
        - citation_fidelity
        - factual_accuracy
        - practical_actionability
    source_notes: "Must cite high pH 8.4 (limits micronutrient availability), very low OC 0.28% (critical), low N at 125 kg/ha, low P at 12.5 kg/ha (Olsen P in alkaline soil), Zn deficient at 0.42 (<0.6 critical limit), Fe deficient at 3.2 (<4.5 critical limit), free CaCO3 at 8.5% causing P fixation. Indian soil test conventions (kg/ha for NPK). Must NOT recommend acidifying amendments that would react with free CaCO3."
    tags: [soil_testing, data_interpretation, india, rajasthan, alkaline_soils]

  - id: grounding_citation_0006
    question_type: data_interpretation
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Base your analysis ONLY on the data provided. Cite specific values."
    context_data: |
      Soil Test Results - Sample ID: JP-IBA-2024-0091
      Location: Tsukuba, Ibaraki Prefecture, Japan (36.1°N, 140.1°E, 25m elevation)
      Date: February 2024 (pre-rice season)

      pH (H2O): 5.8
      pH (KCl): 4.9
      Organic Matter: 8.6%
      Total Nitrogen: 0.52%
      Troug Phosphorus: 18.5 mg P2O5/100g
      Phosphate Absorption Coefficient: 1,850 mg P2O5/100g
      Exchangeable K: 0.35 cmol(c)/kg
      Exchangeable Ca: 8.2 cmol(c)/kg
      Exchangeable Mg: 1.4 cmol(c)/kg
      CEC: 28.6 cmol(c)/kg
      Base Saturation: 35%
      Exchangeable Mn: 8.5 mg/kg
      Hot-water extractable B: 0.32 mg/kg
      Texture: Loam (volcanic ash derived)
      Bulk Density: 0.72 g/cm³
      Available Silica (pH 4 acetate): 8.2 mg SiO2/100g
    turns:
      - role: user
        content: |
          Interpret this Andisol soil test from Japan's Kanto region. Explain the
          significance of the phosphate absorption coefficient in relation to actual P
          availability, evaluate the silica status for rice production, and recommend
          appropriate fertility management.
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        pH_H2O: 5.8
        organic_matter: 8.6
        phosphate_absorption_coefficient: 1850.0
        troug_P: 18.5
        CEC: 28.6
        bulk_density: 0.72
        available_silica: 8.2
        base_saturation: 35.0
      dimensions:
        - data_grounding
        - citation_fidelity
        - factual_accuracy
        - practical_actionability
    source_notes: "Must explain PAC at 1850 (very high P fixation by allophane/imogolite in Andisols, typical >1500), meaning Troug P at 18.5 is borderline despite appearing adequate. Available silica at 8.2 is low for rice (need >13 for optimal, Si critical for disease resistance). Low bulk density 0.72 is characteristic of Andisols (not compaction indicator). High OM 8.6% is typical for Andisol. Japanese soil testing conventions."
    tags: [soil_testing, data_interpretation, japan, andisol, phosphorus_fixation]

  - id: grounding_citation_0007
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Base your analysis ONLY on the data provided. Cite specific values."
    context_data: |
      Soil Test Results - Sample ID: CN-HEB-2024-0557
      Location: Shijiazhuang, Hebei Province, China (38.0°N, 114.5°E, 80m elevation)
      Date: March 2024 (pre-wheat harvest, irrigated winter wheat)

      pH (water): 7.9
      Organic Matter: 1.45%
      Total Nitrogen: 0.09%
      Available Phosphorus (Olsen): 28.5 mg/kg
      Available Potassium: 145 mg/kg
      Exchangeable Ca: 22.4 cmol(c)/kg
      Exchangeable Mg: 3.8 cmol(c)/kg
      CEC: 18.2 cmol(c)/kg
      Total Salt Content: 0.18%
      Texture: Silt loam (15% sand, 62% silt, 23% clay)
      Soil Organic Carbon Density (0-20cm): 22.8 t C/ha
      NO3-N (0-100cm profile):
        0-20cm: 45 mg/kg
        20-40cm: 68 mg/kg
        40-60cm: 52 mg/kg
        60-100cm: 35 mg/kg
    turns:
      - role: user
        content: |
          Analyze this North China Plain soil test, paying special attention to the
          nitrate-nitrogen profile data. What does the nitrate distribution tell you about
          past management, and what are the risks for groundwater? Recommend adjustments
          to the wheat-maize double crop nitrogen management.
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        pH: 7.9
        organic_matter: 1.45
        phosphorus: 28.5
        nitrate_0_20: 45.0
        nitrate_20_40: 68.0
        nitrate_40_60: 52.0
        nitrate_60_100: 35.0
        SOC_density: 22.8
      dimensions:
        - data_grounding
        - citation_fidelity
        - factual_accuracy
        - practical_actionability
    source_notes: "Must cite nitrate accumulation peaking at 20-40cm (68 mg/kg, indicates excess N application leaching below root zone), high total profile NO3-N (calculate ~200 kg N/ha in 0-100cm, common on NCP from over-fertilization at 500+ kg N/ha/year). P at 28.5 is high (historical over-application). Low OM at 1.45% despite heavy fertilization. Should recommend reducing N inputs by 30-40%, split applications, using profile N-test to credit residual N."
    tags: [soil_testing, data_interpretation, china, nitrate_leaching, north_china_plain]

