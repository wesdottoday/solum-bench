  - id: grounding_citation_0003
    question_type: data_interpretation
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Base your analysis ONLY on the data provided. Cite specific values."
    context_data: |
      Soil Test Results - Sample ID: BR-MT-2024-1456
      Location: Sinop, Mato Grosso, Brazil (11.9°S, 55.5°W, 384m elevation)
      Date: September 2024 (end of dry season)

      pH (CaCl2): 4.3
      pH (water): 5.0
      Organic Matter: 2.1%
      Total Nitrogen: 0.11%
      Available Phosphorus (Mehlich-1): 3.8 mg/dm³
      Exchangeable K: 0.12 cmol(c)/dm³
      Exchangeable Ca: 0.8 cmol(c)/dm³
      Exchangeable Mg: 0.3 cmol(c)/dm³
      Exchangeable Al: 0.9 cmol(c)/dm³
      H+Al: 5.2 cmol(c)/dm³
      CEC (pH 7.0): 6.42 cmol(c)/dm³
      Base Saturation (V%): 19%
      Aluminum Saturation (m%): 42%
      Texture: Clay (68% clay, 18% silt, 14% sand)
      Micronutrients: B 0.15 mg/dm³, Cu 0.8 mg/dm³, Fe 38 mg/dm³, Mn 4.2 mg/dm³, Zn 0.6 mg/dm³
    turns:
      - role: user
        content: |
          Analyze this Cerrado Oxisol soil test from Mato Grosso. Calculate the lime
          requirement to reach 50% base saturation for soybean, identify all nutrient
          deficiencies, and recommend a regenerative amendment strategy.
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        pH_CaCl2: 4.3
        phosphorus: 3.8
        aluminum_saturation: 42.0
        base_saturation: 19.0
        CEC: 6.42
        H_plus_Al: 5.2
        boron: 0.15
        zinc: 0.6
      dimensions:
        - data_grounding
        - citation_fidelity
        - factual_accuracy
        - practical_actionability
    source_notes: "Must cite V% = 19% (critically low, need 50% for soy), Al sat at 42% (toxic above 20%), calculate lime need: CEC x (V2-V1)/100 x PRNT factor = 6.42 x (50-19)/100 = ~2.0 t/ha of limestone. Must flag P at 3.8 as very low for clay soil (need >12), B at 0.15 as deficient (<0.2), Zn at 0.6 as deficient (<1.0). Brazilian soil analysis conventions (dm³, V%, m%)."
    tags: [soil_testing, data_interpretation, brazil, cerrado, liming_calculation]

  - id: grounding_citation_0004
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Base your analysis ONLY on the data provided. Cite specific values."
    context_data: |
      Soil Test Results - Sample ID: AR-PAM-2024-0678
      Location: Pergamino, Buenos Aires Province, Argentina (33.9°S, 60.6°W, 65m elevation)
      Date: April 2024 (post-soybean harvest)

      pH (water): 5.9
      Organic Matter: 3.4%
      Total Nitrogen: 0.17%
      Available Phosphorus (Bray-1): 11.5 mg/kg
      Exchangeable K: 1.85 cmol(c)/kg
      Exchangeable Ca: 7.2 cmol(c)/kg
      Exchangeable Mg: 2.1 cmol(c)/kg
      Exchangeable Na: 0.15 cmol(c)/kg
      CEC: 15.8 cmol(c)/kg
      Base Saturation: 72%
      Texture: Silty clay loam (12% sand, 53% silt, 35% clay)
      Soil Water Erosion Index: Moderate (8 t/ha/year estimated loss)
      Sulfur (S-SO4): 5.2 mg/kg
    turns:
      - role: user
        content: |
          Assess this Pampean Mollisol soil test from Argentina's core agricultural zone.
          What nutrient limitations exist for a wheat-soybean double crop, and how does
          the erosion data factor into your recommendations?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        pH: 5.9
        organic_matter: 3.4
        phosphorus: 11.5
        CEC: 15.8
        sulfur: 5.2
        erosion_rate: 8.0
      dimensions:
        - data_grounding
        - citation_fidelity
        - factual_accuracy
        - practical_actionability
    source_notes: "Must cite P at 11.5 (marginal for double crop, need >15 for wheat-soy), S at 5.2 mg/kg (deficient, common in Pampean soils now), declining OM at 3.4% (Mollisols historically 5-6%), erosion at 8 t/ha/year (above T value of ~5 t/ha for this soil). Should discuss how continuous soy-wheat without covers is mining P and S while eroding topsoil. K at 1.85 is adequate for this region."
    tags: [soil_testing, data_interpretation, argentina, pampas, erosion]

