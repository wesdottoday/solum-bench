metadata:
  category: reasoning
  subcategory: causal_chains
  version: v1

questions:
  - id: reasoning_causal_0001
    question_type: open_ended
    difficulty: medium
    regions: [north_america]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          A wheat farmer in the US Great Plains (Kansas) converted from conventional moldboard plowing to no-till five years ago. Explain the cascade of soil biological changes that would have occurred over those five years, including shifts in fungal-to-bacterial ratios, earthworm populations, mycorrhizal colonization, and aggregate stability. Why does this sequence unfold in this particular order?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: year 1-2 residue accumulation and surface microbial shift, bacterial dominance initially giving way to increased fungal biomass by year 2-3, earthworm recolonization timeline, mycorrhizal network re-establishment as tillage disturbance ceases, improved aggregate stability through glomalin and fungal hyphae, and the feedback loop between aggregates protecting SOM which feeds further biological activity. Should note the 'transition penalty' of lower yields in years 1-3."
    tags: [no_till, soil_biology, great_plains, transition, fungal_bacterial_ratio]

  - id: reasoning_causal_0002
    question_type: open_ended
    difficulty: hard
    regions: [south_america]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Why does adding lime to highly weathered acidic Oxisols in the Brazilian Cerrado sometimes fail to improve crop yields, even though soil pH increases? Explain the full chain of chemical and biological interactions that can cause this counterintuitive outcome.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should include: Oxisols dominated by kaolinite and iron/aluminum oxides with variable charge; liming raises pH but can create phosphorus fixation by freshly exposed iron hydroxide surfaces; calcium may displace aluminum but doesn't address underlying P deficiency; overliming can immobilize micronutrients (Zn, Mn, Fe, Cu); disruption of adapted microbial communities; CEC is pH-dependent in these soils so nutrient leaching patterns change; the importance of deep liming because Al toxicity in subsoil restricts root depth."
    tags: [liming, oxisols, cerrado, phosphorus_fixation, soil_chemistry]

  - id: reasoning_causal_0003
    question_type: open_ended
    difficulty: medium
    regions: [sub_saharan_africa]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Explain how overgrazing in the Sahel region of West Africa creates a positive feedback loop leading to desertification. Include the roles of soil surface crusting, albedo changes, rainfall patterns, and loss of soil biological activity in your explanation.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: removal of vegetation exposes soil surface; raindrop impact destroys aggregates forming physical crusts; crusted soil has higher albedo reflecting more solar radiation; reduced evapotranspiration means less local moisture recycling and potentially reduced convective rainfall (Charney hypothesis); reduced infiltration increases runoff and erosion; loss of organic matter inputs starves soil biota; fewer soil organisms means less bioturbation and aggregate formation; seeds cannot germinate through crusted surface; wind erosion accelerates on bare ground; each factor reinforces the others in a degradation spiral."
    tags: [overgrazing, desertification, sahel, feedback_loops, soil_crusting]

  - id: reasoning_causal_0004
    question_type: open_ended
    difficulty: medium
    regions: [north_america]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Explain why cover crop termination timing is far more critical in semi-arid regions (e.g., western Kansas, 450 mm annual rainfall) than in humid regions (e.g., Ohio, 1000 mm annual rainfall). What specific causal chain connects termination timing to cash crop yield risk in dry climates?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: in semi-arid zones, cover crops transpire limited stored soil moisture; every day of growth past optimal termination depletes finite water reserves; no reliable rainfall to recharge profile before cash crop needs it; the 'green bridge' concept where living cover crops draw down subsoil moisture; in humid regions, frequent rainfall replenishes soil water making timing less critical; should mention the tradeoff between biomass benefits (erosion control, N fixation, weed suppression) vs water use; concept of 'soil water bank' and withdrawal timing; possibly mention chemical vs roller-crimper termination and their different moisture implications."
    tags: [cover_crops, termination_timing, semi_arid, water_management]

  - id: reasoning_causal_0005
    question_type: open_ended
    difficulty: hard
    regions: [north_america]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Why do heavily tilled Mollisols in the US Great Plains lose organic matter faster than Mollisols with similar initial carbon stocks in cooler climates like southern Alberta, Canada? Explain all contributing factors including temperature kinetics, moisture regimes, and the interaction between tillage and climate.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should include: Q10 temperature sensitivity of microbial decomposition (roughly doubles per 10C); warmer Kansas soils have higher mean annual temperature driving faster enzymatic breakdown; tillage physically disrupts aggregates exposing previously protected organic matter to microbial attack (aggregate hierarchy theory); more freeze-thaw cycles in Alberta slow decomposition for longer periods; wetting-drying cycles in Great Plains can stimulate 'Birch effect' decomposition pulses; wind erosion selectively removes carbon-rich topsoil particles; shorter fallow periods with more intensive cropping; moisture-temperature interaction means decomposition peaks when both moisture and temperature are adequate simultaneously."
    tags: [mollisols, organic_matter_loss, tillage, climate_interaction, great_plains]

  - id: reasoning_causal_0006
    question_type: open_ended
    difficulty: medium
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Trace the causal chain from soil compaction (caused by heavy machinery traffic on wet clay soil) through to nutrient loss from the field. Include every major step: physical, hydrological, chemical, and biological consequences.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should trace: heavy machinery on wet soil compresses macropores; reduced macroporosity decreases infiltration rate and hydraulic conductivity; water pools on surface creating anaerobic microsites; surface runoff increases carrying dissolved and particulate nutrients (especially P); compacted subsoil creates perched water table; anaerobic conditions promote denitrification (N2O, N2 gas loss); restricted root penetration means reduced nutrient uptake efficiency; fewer earthworms and reduced bioturbation; weakened root systems reduce mycorrhizal colonization and nutrient scavenging; cycle perpetuates as compacted soil has fewer biological channels to restore porosity."
    tags: [compaction, erosion, nutrient_loss, soil_physics, hydrology]

  - id: reasoning_causal_0007
    question_type: open_ended
    difficulty: hard
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Explain how common mycorrhizal networks (CMNs) redistribute nutrients between plants in a diverse agroforestry system. Include the mechanisms by which carbon, phosphorus, and nitrogen move through these networks, and why this process confers a competitive advantage to the plant community as a whole rather than individual plants.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: AM and EM fungi form hyphal networks linking root systems of different plant species; source-sink gradients drive nutrient movement (carbon from high-photosynthesis to shaded understory plants); phosphorus transferred via polyphosphate granules in hyphal vacuoles; nitrogen as amino acids (especially arginine) or ammonium; the 'wood wide web' concept; preferential allocation to plants providing more carbon (biological market); nurse plant effects where established trees support seedlings; warning signal transmission; community-level resilience from shared resource pools; evolutionary debate about mutualism vs parasitism in CMNs."
    tags: [mycorrhizae, nutrient_redistribution, agroforestry, common_mycorrhizal_networks]

  - id: reasoning_causal_0008
    question_type: open_ended
    difficulty: hard
    regions: [tropics]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Biochar applied to highly weathered Ferralsols in the Congo Basin produces dramatic yield improvements, but the same biochar applied to fertile Chernozems in Ukraine shows minimal or no yield benefit. Explain the causal reasons for this difference, addressing CEC, nutrient retention, pH buffering, soil biology, and base saturation.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should explain: Ferralsols have very low native CEC (dominated by kaolinite and oxides with variable charge), so biochar's high CEC surface dramatically improves nutrient retention; these soils are acidic and biochar's liming effect raises pH toward optimal range; biochar creates habitat for beneficial microbes in otherwise low-organic-matter soils; in Chernozems, native SOM already provides high CEC (40+ cmol/kg), pH is already near neutral, and biological activity is robust; biochar is 'filling a gap' in degraded soils but redundant in fertile ones; possible negative effects in Chernozems from excessive alkalinity or sorption of beneficial organic compounds; also address nutrient-poor vs nutrient-rich feedstock biochar differences."
    tags: [biochar, tropical_soils, chernozem, cec, soil_fertility]

  - id: reasoning_causal_0009
    question_type: open_ended
    difficulty: medium
    regions: [south_asia]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Explain the causal mechanism of salt accumulation in irrigated farmland in Rajasthan, India. Trace the chain from irrigation water source through evapotranspiration, capillary rise, and eventual soil salinization. Why does this problem worsen year after year without intervention?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: irrigation water contains dissolved salts (even 'fresh' water has 200-500 mg/L TDS); in arid climate (high evaporative demand, low rainfall), water evaporates but salts remain in soil profile; shallow water tables develop from over-irrigation; capillary rise brings salt-laden groundwater to root zone and surface; high temperatures accelerate evaporation concentrating salts; sodicity (high Na) destroys soil structure causing dispersion of clay particles; surface crusting reduces infiltration; positive feedback loop as reduced infiltration concentrates more salt at surface; lack of leaching fraction in water-scarce environment; canal-irrigated areas raise regional water tables affecting neighboring fields."
    tags: [salinization, irrigation, rajasthan, arid_soils, salt_accumulation]

  - id: reasoning_causal_0010
    question_type: open_ended
    difficulty: hard
    regions: [south_america]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Describe how deforestation of Amazonian rainforest in Mato Grosso, Brazil, for soybean cultivation affects soil structure, biology, and hydrology over the first five years. Why is the degradation trajectory so rapid in these soils compared to deforestation of temperate deciduous forests?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should include: most nutrients in tropical forests are in the biomass not the soil (shallow nutrient cycling); burning releases a nutrient pulse but also destroys organic matter; Ferralsols/Oxisols have low native fertility and CEC dependent on organic matter; loss of constant litter input collapses soil food web rapidly; intense tropical rainfall on exposed soil causes slaking and surface sealing; loss of root channels reduces infiltration; high temperatures accelerate SOM decomposition; iron and aluminum oxides cement into hardpans (laterization risk); compared to temperate forests where soils store more nutrients and organic matter in mineral-associated fractions, have lower temperatures slowing decomposition, and less intense rainfall. Should mention the 3-5 year 'fertility window' before yields crash."
    tags: [deforestation, mato_grosso, tropical_soils, soil_degradation, amazon]

  - id: reasoning_causal_0011
    question_type: open_ended
    difficulty: easy
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Why is it more difficult to build soil organic matter in sandy soils compared to clay soils, even when the same amount of organic inputs are applied? Explain the physical and chemical reasons.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: sand particles have low surface area so less mineral-associated organic matter (MAOM) can form; no clay platelet surfaces for organo-mineral complexes; larger pore spaces allow more oxygen penetration accelerating aerobic decomposition; poor aggregate formation means no physical protection of organic matter in microaggregates; low CEC means organic matter is the primary source of nutrient retention, so microbes rapidly decompose any additions; faster drainage reduces anaerobic microsites that would slow decomposition; less reactive surface chemistry (no 2:1 clay interlayer spaces)."
    tags: [soil_organic_matter, sandy_soils, clay_soils, carbon_storage]

  - id: reasoning_causal_0012
    question_type: open_ended
    difficulty: medium
    regions: [europe]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          A farmer in northern France switched from annual plowing to no-till and noticed earthworm populations tripled within three years. Explain the full causal chain: why does tillage suppress earthworms, and how does their recovery create cascading benefits for soil structure, water infiltration, and nutrient cycling?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: tillage physically injures and kills earthworms (especially anecic species like Lumbricus terrestris); destroys permanent burrows; removes surface residue food source; exposes worms to predation and desiccation; no-till restores surface residue and permanent burrow systems; earthworm burrows create macropores for preferential water flow (up to 6x infiltration increase); casts are nutrient-rich and well-aggregated; mucus secretions stimulate microbial activity; deep-burrowing species transport surface residue into subsoil (bioturbation); middens around burrow openings concentrate nutrients; should distinguish between epigeic, endogeic, and anecic functional groups."
    tags: [earthworms, no_till, soil_structure, france, soil_biology]

  - id: reasoning_causal_0013
    question_type: open_ended
    difficulty: easy
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Why do waterlogged soils (such as poorly drained paddy fields or peatlands) produce methane? Trace the causal chain from water saturation through oxygen depletion to methanogenesis, and explain why this matters for climate change.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: water fills pore spaces displacing air; oxygen consumed by aerobic microbes is not replaced; sequential reduction of electron acceptors (O2, then NO3-, Mn4+, Fe3+, SO42-) by facultative and obligate anaerobes; once all preferred acceptors exhausted, methanogens (archaea) reduce CO2 or ferment acetate to produce CH4; methane is ~28-34x more potent greenhouse gas than CO2 over 100 years; ebullition (bubbling) and plant-mediated transport bypass oxidation at soil-water interface; global rice paddies produce ~1.5% of global GHG emissions; peatland drainage can shift from CH4 to CO2 emissions."
    tags: [methane, anaerobic_decomposition, waterlogged_soils, climate_change]

  - id: reasoning_causal_0014
    question_type: open_ended
    difficulty: hard
    regions: [arctic, subarctic]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Explain how climate warming affects soil carbon dynamics in permafrost regions of Siberia and northern Canada. What is the permafrost carbon feedback, and why do scientists consider it a potential tipping point? Include both direct decomposition effects and indirect hydrological changes.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should include: permafrost stores ~1500 Gt C (twice atmospheric CO2); warming thaws active layer exposing previously frozen organic matter to decomposition; thawed saturated soils produce methane, thawed drained soils produce CO2; thermokarst formation creates lakes and wetlands altering drainage; released GHGs cause further warming (positive feedback); rate depends on temperature sensitivity (Q10) of ancient organic matter; microbial communities in thawed permafrost take time to adapt but then decompose rapidly; abrupt vs gradual thaw scenarios; Arctic amplification means warming 2-3x global average; potential for 5-15% of permafrost carbon released by 2100 under high warming scenarios; this is a tipping point because once started, the feedback is self-reinforcing and irreversible on human timescales."
    tags: [permafrost, carbon_feedback, climate_change, arctic_soils, tipping_points]

  - id: reasoning_causal_0015
    question_type: open_ended
    difficulty: medium
    regions: [australia, sub_saharan_africa]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Explain the contrasting short-term and long-term effects of fire on soil in Australian savanna grasslands. How does a single low-intensity burn differ from repeated high-intensity burns in terms of nutrient cycling, soil biology, and organic matter dynamics?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: low-intensity burn consumes surface litter releasing ash (K, Ca, Mg, P) in plant-available forms; brief heat pulse sterilizes top 1-2 cm but deeper organisms survive; post-fire nutrient flush stimulates microbial activity and plant regrowth; some pyrogenic carbon (biochar-like) created, which is highly stable; repeated high-intensity burns progressively deplete organic matter, volatilize nitrogen (>200C), can sterilize soil to greater depth, destroy seed banks, kill fungal networks; repeated burning without recovery period leads to nutrient mining; Australian Aboriginal fire-stick farming used low-intensity mosaic burns to manage this; should contrast with African savanna fire regimes."
    tags: [fire, soil_biology, nutrient_cycling, australia, savanna]

  - id: reasoning_causal_0016
    question_type: open_ended
    difficulty: easy
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          A farmer notices that after years of growing corn continuously on the same field, yields are declining even though fertilizer rates have increased. Explain three soil-related causal chains that could explain this yield decline.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should identify at least three chains: (1) soil structure degradation from repeated tillage reducing water infiltration and root penetration; (2) buildup of corn-specific pathogens, nematodes, and pest pressure without rotation to break disease cycles; (3) decline in mycorrhizal diversity and function from monoculture and high P fertilization; also valid: micronutrient depletion not addressed by NPK fertilizer; loss of soil organic matter reducing water-holding capacity; increased herbicide-resistant weed pressure; aluminum toxicity from acidification caused by ammonium-based fertilizers."
    tags: [monoculture, yield_decline, soil_degradation, continuous_cropping]

  - id: reasoning_causal_0017
    question_type: open_ended
    difficulty: medium
    regions: [southeast_asia]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          In the highlands of northern Vietnam, farmers practice slash-and-burn agriculture with increasingly short fallow periods (from 15 years down to 3 years). Explain the causal chain of soil degradation that results from shortened fallow, and why there is a critical threshold below which the system cannot recover.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should explain: long fallow allows forest regrowth which restores organic matter, rebuilds nutrient stocks through deep-rooted tree uptake and litterfall, re-establishes mycorrhizal networks, and improves soil structure; shortened fallow means insufficient time for these processes; soil organic matter drops below threshold needed to maintain aggregate stability; nutrients exported in harvest not fully replenished by short fallow; acidification from repeated burning without sufficient base cation recycling; weed species shift to aggressive grasses that outcompete crops; below ~5-7 year fallow on these soils, degradation exceeds recovery capacity; steep slopes amplify erosion risk on degraded soils."
    tags: [slash_and_burn, fallow, vietnam, soil_recovery, shifting_cultivation]

  - id: reasoning_causal_0018
    question_type: open_ended
    difficulty: hard
    regions: [central_asia]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          The Aral Sea region of Uzbekistan has experienced massive soil salinization following decades of cotton monoculture with canal irrigation. Explain the interconnected causal chains involving water table rise, salt redistribution, soil structure collapse, and how these created a regional-scale ecological disaster.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should cover: diversion of Amu Darya and Syr Darya rivers for irrigation; flood irrigation without adequate drainage raised water tables; capillary rise brought salts to surface in arid climate (high evaporative demand); sodium-dominated salts caused clay dispersion destroying soil structure; cotton monoculture demanded heavy irrigation perpetuating the cycle; wind erosion of dried Aral Sea bed deposited salt-laden dust on surrounding farmland; saline drainage water returned to rivers increased downstream salinity; soil biological activity collapsed in highly saline conditions; white salt crusts on surface reflect sunlight altering local microclimate; multi-generational environmental disaster affecting millions of hectares."
    tags: [salinization, aral_sea, uzbekistan, irrigation, cotton, ecological_disaster]

  - id: reasoning_causal_0019
    question_type: open_ended
    difficulty: easy
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Explain why adding fresh high-carbon residues like wheat straw (C:N ratio of 80:1) to soil can temporarily reduce nitrogen available to the next crop. What is the biological mechanism, and how long does this "nitrogen tie-up" typically last?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should explain: soil microbes decomposing high-C:N material need nitrogen to build their own biomass (C:N ~8:1 for bacteria, ~15:1 for fungi); they outcompete plant roots for available soil nitrogen (NO3- and NH4+); this is 'nitrogen immobilization'; lasts until microbial population stabilizes and C:N of remaining residue drops below ~20-25:1; typically 2-8 weeks depending on temperature, moisture, and residue particle size; nitrogen is not lost, just temporarily locked in microbial biomass; will be released (mineralized) as microbes die and are consumed; practical implications for planting timing and N fertilizer management."
    tags: [nitrogen_immobilization, cn_ratio, residue_decomposition, nutrient_management]

  - id: reasoning_causal_0020
    question_type: open_ended
    difficulty: medium
    regions: [east_africa]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          In the Kenyan highlands, smallholder farmers often observe that their tea and coffee yields decline after several years of continuous cultivation on Nitisols. Explain the causal chain linking continuous export cropping, soil acidification, aluminum toxicity, and phosphorus fixation in these soils.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should trace: continuous harvest removes base cations (Ca, Mg, K); ammonium-based fertilizers produce H+ during nitrification; both processes acidify the soil; as pH drops below 5.5, aluminum solubility increases sharply; Al3+ is toxic to roots, inhibiting elongation and branching; reduced root system cannot access nutrients or water effectively; at low pH, phosphorus binds tightly to aluminum and iron oxides becoming unavailable; Nitisols already have high P-fixation capacity; declining organic matter (from residue removal) reduces pH buffering; cycle accelerates without liming intervention; should mention that tea tolerates some acidity but even tea has limits around pH 4.0."
    tags: [tea, coffee, nitisols, kenya, aluminum_toxicity, acidification]

  - id: reasoning_causal_0021
    question_type: open_ended
    difficulty: easy
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Explain why crop rotation is more effective at suppressing soilborne diseases than fungicide applications alone. What is the biological causal chain that makes rotation work?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should explain: soilborne pathogens (Fusarium, Rhizoctonia, Pythium, nematodes) build up inoculum when their host is grown continuously; rotation breaks the disease cycle by removing the host for 1-3 years; pathogen propagules (spores, sclerotia) decline through natural attrition; different crops support different microbial communities creating 'disease-suppressive soils'; diverse rotations increase antagonistic organisms (Trichoderma, Pseudomonas); fungicides target specific pathogens but don't rebuild suppressive microbiology and can harm beneficial organisms; resistance development is a risk with chemical-only approaches; rotation also disrupts pest and weed cycles."
    tags: [crop_rotation, disease_suppression, soil_biology, integrated_pest_management]

  - id: reasoning_causal_0022
    question_type: open_ended
    difficulty: hard
    regions: [south_asia]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          In the Indo-Gangetic Plains, the rice-wheat rotation system has been practiced for decades with intensive tillage and flood irrigation for rice, followed by wheat. Explain the interconnected degradation pathways: how does this system simultaneously cause soil compaction (plough pan formation), zinc deficiency, methane emissions, declining water tables, and arsenic contamination of rice grain? Show how these are causally linked rather than independent problems.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should show interconnections: repeated puddling for rice creates hard pan at 15-20 cm restricting root growth and drainage; flood irrigation for rice creates anaerobic conditions producing methane AND reducing Fe/Mn oxides which releases bound arsenic into soil solution taken up by rice; zinc becomes unavailable under flooded conditions (zinc sulfide precipitation); enormous water demand lowers water tables requiring deeper wells; pumping from deeper aquifers accesses naturally occurring arsenic in Bengal Delta sediments; hard pan prevents natural drainage between seasons compounding waterlogging; organic matter decomposition under anaerobic conditions is slow, creating dependency on fresh organic inputs. These are connected through the common driver of prolonged soil saturation."
    tags: [rice_wheat, indo_gangetic, compaction, arsenic, methane, zinc_deficiency]

  - id: reasoning_causal_0023
    question_type: open_ended
    difficulty: medium
    regions: [mediterranean]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Olive groves in southern Spain have traditionally been maintained with bare soil between trees through herbicide application or tillage. Explain why this practice leads to accelerating soil erosion on sloped terrain, and trace the causal chain from bare soil through rill formation to eventual gully erosion and loss of productive capacity.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
