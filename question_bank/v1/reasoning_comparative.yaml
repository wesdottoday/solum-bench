  - id: reasoning_comparative_0024
    question_type: open_ended
    difficulty: hard
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Compare soil food web structure and function in four contrasting agricultural systems: (1) intensive conventional row cropping (corn-soybean, tillage, synthetic inputs), (2) certified organic vegetable production (tillage-intensive, compost-based), (3) regenerative no-till grain production (cover crops, diverse rotation, reduced inputs), and (4) managed silvopasture (trees + pasture + rotational grazing). For each system, describe the dominant trophic levels, fungal:bacterial ratio, key functional groups present or absent, and the implications for nutrient cycling and disease suppression.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should compare all four: (1) INTENSIVE CONVENTIONAL: bacterial-dominated (F:B <0.5); simplified food web with few higher-order predators; low protozoan and nematode diversity; mycorrhizae largely absent due to tillage, high P, and fungicides; bacterial-driven nutrient cycling is fast but leaky (mineralization excess, no fungal retention); pathogen pressure high without biological suppression. (2) ORGANIC VEGETABLE: moderate F:B (0.5-1.0); more diverse bacteria due to compost inputs; but frequent tillage still suppresses fungi and earthworms; protozoan grazing releases bacterial-held nutrients; some disease suppression from compost biology; better than (1) but still tillage-limited. (3) REGENERATIVE NO-TILL: fungal-dominated (F:B 1.0-2.0); mycorrhizal networks re-established; diverse nematode community including predators and fungivores; earthworm populations high; fungal-mediated nutrient cycling is slow and efficient; disease-suppressive soil develops through competitive exclusion and antibiosis; most similar to native prairie soil ecology. (4) SILVOPASTURE: highest F:B ratio (>2.0 approaching forest soils); ectomycorrhizae on trees plus AM fungi on grasses; complex multi-trophic food web; dung beetle community adds macro-fauna processing; highest arthropod diversity; most resilient to perturbation; nutrient cycling through both fungal and bacterial channels provides greatest functional diversity."
    tags: [soil_food_web, farming_systems_comparison, fungal_bacterial_ratio, trophic_structure]

  - id: reasoning_comparative_0025
    question_type: open_ended
    difficulty: medium
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Explain your reasoning thoroughly."
    turns:
      - role: user
        content: |
          Compare the use of synthetic gypsum (CaSO4 from industrial byproduct) versus mined agricultural lime (CaCO3) for improving soil structure on a sodic clay soil (ESP > 15%, pH 8.7). Explain the different chemical mechanisms by which each amendment addresses sodicity, how quickly each works, and the secondary effects on nutrient availability, soil biology, and water infiltration.
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should compare: GYPSUM (CaSO4): provides Ca2+ to displace Na+ from exchange sites; Na+ removed as Na2SO4 in drainage water; DOES NOT raise pH (neutral salt); works relatively quickly (weeks to months) as gypsum is moderately soluble; also provides sulfur as SO42- (secondary nutrient benefit); Ca improves flocculation of clay creating aggregates; effective even on calcareous sodic soils; improves infiltration as structure improves. LIME (CaCO3): also provides Ca2+ but much less soluble than gypsum; raises pH further (problematic in already alkaline soil); very slow to dissolve at pH >7 due to carbonate buffering; would worsen micronutrient availability (Fe, Zn, Mn); on ACIDIC sodic soils, lime would be appropriate (pH correction + Ca2+ supply); but on alkaline sodic soils (pH 8.7 as specified), lime is WRONG choice - pH increase would be harmful. CLEAR RECOMMENDATION: gypsum for alkaline sodic soils; lime only for acidic soils needing pH correction; gypsum rate typically 2-10 t/ha depending on severity; must be combined with adequate drainage for Na removal; organic matter additions complement chemical amendment by stabilizing improved structure."
    tags: [gypsum, lime, sodic_soils, soil_structure, sodium, calcium]
