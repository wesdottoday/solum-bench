        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should compare: PLASTIC MULCH: impermeable barrier eliminating evaporation from covered surface; black plastic warms soil 3-5C (beneficial for warm-season crops in cool climates); clear plastic warms more but allows weed growth; blocks rainfall requiring drip irrigation; no organic matter contribution; creates microplastic pollution as it degrades; must be removed and disposed (labor + waste); no benefit to soil biology (actually suppresses some organisms through temperature extremes and moisture exclusion). ORGANIC MULCH: reduces evaporation while allowing rainfall infiltration; moderates soil temperature (cooler in summer, warmer in winter); provides continuous food source for decomposers (fungi, bacteria, earthworms); builds SOM over time; suppresses weeds through physical barrier and allelopathy; maintains soil moisture more evenly; improves aggregate stability at soil surface; attracts and supports arthropod communities; straw may introduce weed seeds; wood chips can immobilize N at soil surface. REGENERATIVE CHOICE: short-term yield sacrifice offset by long-term soil building, no plastic waste, reduced input costs over time, carbon sequestration, and improved system resilience."
