    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should compare nutrient contents and characteristics: CATTLE MANURE COMPOST: moderate N (1.5-2.5%), moderate P (0.5-1.5%), high K (2-3%); balanced micronutrients; good organic matter contribution; relatively stable C; slower nutrient release; lower salt content. POULTRY LITTER: high N (3-5%), very high P (2-4%), moderate K (2-3%); high Ca from limestone in feed; potential for excessive P accumulation; higher salt content and potential for NH3 burn; faster nutrient release; contains trace elements from feed additives (Zn, Cu, sometimes concerning levels). GREEN WASTE COMPOST: low N (0.5-1.5%), low P (0.2-0.5%), low K (0.5-1%); highest C:N ratio and most stable organic matter; best for bulk soil improvement; very low salt; slow nutrient release. RECOMMENDATIONS: (a) P-deficient: poultry litter (highest P) but watch for over-application; (b) long-term SOM: green waste compost (most stable C, highest application rates practical); (c) micronutrient correction: cattle manure provides balanced trace elements, but specific deficiencies may need targeted amendments."
