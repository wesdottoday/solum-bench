        content: |
          Compare the System of Rice Intensification (SRI) with conventional flooded rice cultivation for their effects on soil health, water use, greenhouse gas emissions, and yield potential. SRI uses younger seedlings, wider spacing, intermittent flooding, and organic matter additions. Explain the soil biological and chemical mechanisms by which SRI can produce equal or higher yields with less water and fewer inputs. What limits its adoption despite demonstrated benefits?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should compare: CONVENTIONAL FLOODED: continuous standing water; anaerobic soil conditions; methane emissions from methanogenesis (significant GHG source); reduced nutrient availability (Zn, S); Fe and Mn toxicity risk; high water use (1500-2000 L/kg rice); limited root growth in puddled soil. SRI: aerobic soil periods during intermittent drying promote root aerobic growth (larger root systems documented); alternating wet-dry creates oscillating redox conditions supporting diverse microbial communities; reduced methane (40-60% less) but potentially more N2O during dry phases (net GHG benefit still positive); wider spacing reduces competition and allows more tillers per plant; younger seedlings transplanted with minimal root damage; organic matter inputs feed soil biology; mycorrhizal colonization possible during aerobic phases (impossible under continuous flooding); 25-50% water savings. ADOPTION BARRIERS: labor-intensive (careful transplanting, water management); requires reliable water control (not possible in all paddies); perceived risk by risk-averse smallholders; extension services often promote conventional package; labor availability declining in many rice-growing regions; results variable across soil types."
