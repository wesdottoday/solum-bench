          Compare the soil health outcomes of two regenerative transition strategies for a 500-hectare conventional corn-soybean farm in Iowa: (A) rapid transition: implement no-till, diverse cover crops, and reduce fertilizer immediately across the whole farm; versus (B) gradual transition: convert 20% of acres per year over 5 years, learning and adjusting as you go. What are the agronomic, economic, and soil health trade-offs of each approach?
    scoring_method: llm_judge
    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should compare: RAPID (A): immediate soil disturbance reduction across all acres; faster accumulation of surface residue and biological recovery; BUT high risk of yield penalty in years 1-3 ('transition trough') across entire income base; soil biology and structure need 3-5 years to adjust; weed pressure may spike without tillage or full cover crop establishment; herbicide-resistant weeds a challenge; compacted soils may waterlog without established biopores; financial risk is concentrated. GRADUAL (B): 20%/year allows learning curve; can observe which fields/soil types respond best; income from conventional acres cushions transition losses; allows equipment acquisition over time (cover crop seeder, roller-crimper); each successive block benefits from farmer's growing experience; BUT slower to realize whole-farm soil health benefits; conventional acres continue degrading; split management increases operational complexity; 5 years to full implementation delays carbon and water benefits. HYBRID APPROACH often best: start with most responsive fields (lighter soils, less compaction), learn, adjust, then transition more challenging fields; maintain some flexibility in practices rather than rigid whole-farm protocol."
