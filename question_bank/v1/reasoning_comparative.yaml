    scoring_config:
      dimensions:
        - factual_accuracy
        - reasoning_depth
        - specificity
        - completeness
    source_notes: "Good answer should compare: MECHANICAL: swales (contour ditches) capture overland flow and infiltrate it; keyline design uses landscape contour to distribute water from valleys to ridges; terraces reduce slope and slow runoff; immediate effect upon construction; effective even on degraded, biologically inactive soils; require earthworks (cost, energy); can be overwhelmed by extreme rainfall; maintenance required. BIOLOGICAL: deep-rooted plants create macropores for preferential flow; organic matter increases water-holding capacity (each 1% SOM increase holds additional 75,000-150,000 L/ha); mulch prevents surface sealing and raindrop impact; aggregate stability from biological activity maintains infiltration; slower to establish but self-maintaining; improves with time rather than degrading. INTERACTION: mechanical harvesting concentrates water, biological components capture and store it; swales without vegetation can erode during intense storms; vegetation without water harvesting may not survive establishment in driest sites; Keyline + perennial plantings + mulch = maximum water capture; P.A. Yeomans' original keyline system integrated both mechanical and biological elements; example: Australian property combining keyline design with perennial pasture and silvopasture restored productive capacity on degraded semi-arid land."
