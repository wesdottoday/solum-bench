          Compare the effectiveness of mechanical water harvesting techniques (swales, keyline design, terraces) versus biological water harvesting approaches (deep-rooted perennials, mulch cover, soil organic matter building) for improving water infiltration and retention in semi-arid landscapes. Under what conditions does each approach provide the greatest benefit, and how do they interact when combined?
