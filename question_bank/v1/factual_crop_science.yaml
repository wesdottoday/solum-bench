    choices:
      - "A) Sunflower"
      - "B) Cereal rye"
      - "C) Mustard (Sinapis alba or Brassica juncea)"
      - "D) Red clover"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
