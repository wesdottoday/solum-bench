metadata:
  category: factual
  subcategory: crop_science
  version: v1

questions:
  - id: factual_crop_0001
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          Which of the following crops uses the C4 photosynthetic pathway?
    choices:
      - "A) Wheat"
      - "B) Rice"
      - "C) Sorghum"
      - "D) Soybean"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Sorghum is a C4 crop with high photosynthetic efficiency and water use efficiency. Wheat, rice, and soybean are all C3 crops."
    tags: [photosynthesis, c4, sorghum, plant_physiology]

  - id: factual_crop_0002
    question_type: mcq
    difficulty: medium
    regions: [sub_saharan_africa]
    turns:
      - role: user
        content: |
          In the push-pull intercropping system developed for East Africa, what is the primary role of Desmodium (silverleaf) planted between maize rows?
    choices:
      - "A) It provides grain for human consumption"
      - "B) It repels stem borer moths and suppresses Striga weed through root exudates"
      - "C) It serves solely as a windbreak to reduce lodging"
      - "D) It attracts pollinators to increase maize yield"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Push-pull system (ICIPE, Kenya): Desmodium 'pushes' stem borers away via volatile chemicals and suppresses Striga through allelopathic root exudates. Napier grass on borders 'pulls' borers toward it."
    tags: [push_pull, intercropping, africa, stem_borer, striga, companion_planting]

  - id: factual_crop_0003
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          What is the approximate range of nitrogen fixation by soybeans per hectare per year under good conditions?
    choices:
      - "A) 10-30 kg N/ha"
      - "B) 80-200 kg N/ha"
      - "C) 300-450 kg N/ha"
      - "D) 500-700 kg N/ha"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Soybeans fix approximately 80-200 kg N/ha/year through symbiosis with Bradyrhizobium japonicum. Actual rates depend on inoculation, soil N status, and growing conditions."
    tags: [nitrogen_fixation, soybeans, legumes, nutrient_cycling]

  - id: factual_crop_0004
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          What is the approximate C:N ratio of mature wheat straw?
    choices:
      - "A) 10:1"
      - "B) 25:1"
      - "C) 80:1"
      - "D) 200:1"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Mature wheat straw has a C:N ratio of approximately 80:1 (range 60-100:1). This high ratio means soil microbes will immobilize nitrogen during decomposition, temporarily reducing plant-available N."
    tags: [cn_ratio, wheat, crop_residues, decomposition]

  - id: factual_crop_0005
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Answer concisely."
    turns:
      - role: user
        content: |
          Describe the Three Sisters companion planting system. Which three crops are involved and what is the ecological role of each?
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["corn", "beans", "squash"]
      rubric_criteria:
        - name: three_crops
          description: "Identifies all three crops: corn (maize), beans, and squash"
          max_points: 3
        - name: corn_role
          description: "Explains corn provides a structural trellis for beans to climb"
          max_points: 2
        - name: beans_role
          description: "Explains beans fix nitrogen benefiting all three crops"
          max_points: 2
        - name: squash_role
          description: "Explains squash provides ground cover that suppresses weeds and retains moisture"
          max_points: 2
    source_notes: "Three Sisters is a traditional Indigenous American polyculture. Corn provides structure, beans fix N, squash shades soil. Together they provide complementary nutrition (carbs, protein, vitamins)."
    tags: [companion_planting, three_sisters, intercropping, indigenous_knowledge]

  - id: factual_crop_0006
    question_type: mcq
    difficulty: hard
    regions: [east_africa]
    turns:
      - role: user
        content: |
          Teff (Eragrostis tef) is a staple grain of Ethiopia. Which of the following statements about teff is correct?
    choices:
      - "A) Teff is a C3 grass that requires high rainfall above 1500 mm annually"
      - "B) Teff is a C4 grass with very small seeds (~0.3 mm diameter), naturally gluten-free, and adapted to both waterlogged and drought conditions"
      - "C) Teff is a legume that fixes atmospheric nitrogen"
      - "D) Teff requires vernalization and is primarily grown in cold temperate zones"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Teff is a C4 panicoid grass. Its tiny seeds (~3000 per gram) make it one of the smallest cereal grains. It tolerates both waterlogged Vertisols and drought, grows at 1800-2800 m elevation in Ethiopia, and is gluten-free."
    tags: [teff, ethiopia, small_grains, c4, gluten_free, africa]

  - id: factual_crop_0007
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          Which of the following is a taproot crop rather than having a fibrous root system?
    choices:
      - "A) Wheat"
      - "B) Rice"
      - "C) Daikon radish (tillage radish)"
      - "D) Oats"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Daikon radish has a deep taproot that can penetrate compacted layers (often called 'tillage radish' or 'biodrilling'). Wheat, rice, and oats are grasses with fibrous root systems."
    tags: [root_architecture, taproot, fibrous_roots, cover_crops, biodrilling]

  - id: factual_crop_0008
    question_type: mcq
    difficulty: medium
    regions: [south_america, global]
    turns:
      - role: user
        content: |
          Quinoa (Chenopodium quinoa) is well-adapted to harsh Andean environments. Which stress tolerance is NOT characteristic of quinoa?
    choices:
      - "A) Soil salinity tolerance up to 40 dS/m"
      - "B) Frost tolerance down to -8 degrees Celsius during vegetative growth"
      - "C) Growth at altitudes up to 4,000 meters"
      - "D) Tolerance of permanently waterlogged, anaerobic soils"
    correct_answer: "D"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "D"
    source_notes: "Quinoa is remarkably stress-tolerant: halophyte-level salinity tolerance, frost tolerance, drought tolerance, and high-altitude adaptation. However, it does not tolerate waterlogged soils and requires reasonable drainage."
    tags: [quinoa, andean_crops, stress_tolerance, salinity, south_america]

  - id: factual_crop_0009
    question_type: short_answer
    difficulty: medium
    regions: [tropics]
    system_prompt: "You are a regenerative agriculture expert. Answer concisely."
    turns:
      - role: user
        content: |
          Explain why cassava (Manihot esculenta) is considered a critical food security crop in tropical Africa. Describe its stress tolerances, its role as a living food reserve, and any nutritional limitations.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["drought", "food security"]
      rubric_criteria:
        - name: stress_tolerance
          description: "Describes cassava's tolerance of poor, acidic soils (pH 4-8), drought, and low fertility"
          max_points: 3
        - name: living_reserve
          description: "Explains roots can be left unharvested in the ground for 6-24 months as a flexible food bank"
          max_points: 3
        - name: nutritional_limitations
          description: "Notes cassava is primarily a carbohydrate/energy source but low in protein (~1-2%), and contains cyanogenic glycosides requiring proper processing"
          max_points: 3
    source_notes: "Cassava is the ultimate food security crop: tolerates poor soils, drought, and low fertility. Roots can remain in the ground 6-24 months. It feeds ~500 million people in the tropics but requires processing to remove cyanogenic glycosides (linamarin)."
    tags: [cassava, food_security, tropics, africa, root_crops, drought_tolerance]

  - id: factual_crop_0010
    question_type: short_answer
    difficulty: hard
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Answer concisely."
    turns:
      - role: user
        content: |
          Compare the C:N ratios of the following crop residues and rank them from fastest to slowest decomposition: hairy vetch biomass, mature corn stalks, crimson clover biomass, and sawdust. Provide approximate C:N ratios.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["C:N", "vetch", "corn"]
      rubric_criteria:
        - name: correct_ranking
          description: "Ranks from fastest to slowest: hairy vetch (~11:1), crimson clover (~15:1), corn stalks (~60:1), sawdust (~400-500:1)"
          max_points: 4
        - name: approximate_ratios
          description: "Provides reasonable C:N ratios for at least 3 of the 4 materials"
          max_points: 3
        - name: decomposition_principle
          description: "Explains that lower C:N ratios decompose faster because microbes have sufficient nitrogen"
          max_points: 2
    source_notes: "Hairy vetch ~11:1, crimson clover ~13-15:1, mature corn stalks ~55-65:1, sawdust ~400-500:1. Materials above ~25:1 cause temporary N immobilization during decomposition."
    tags: [cn_ratio, decomposition, crop_residues, cover_crops, nitrogen]

  - id: factual_crop_0011
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          Which cover crop family is best known for biological nitrogen fixation?
    choices:
      - "A) Poaceae (grasses)"
      - "B) Brassicaceae (mustard family)"
      - "C) Fabaceae (legume family)"
      - "D) Polygonaceae (buckwheat family)"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Fabaceae (legumes) form symbioses with Rhizobium bacteria in root nodules to fix atmospheric N2. Examples: clovers, vetches, peas, cowpeas, pigeon peas."
    tags: [nitrogen_fixation, legumes, cover_crops, fabaceae]

  - id: factual_crop_0012
    question_type: mcq
    difficulty: hard
    regions: [global]
    turns:
      - role: user
        content: |
          Which of the following crop residues has the strongest documented allelopathic effect on subsequent crop germination?
    choices:
      - "A) Oat straw"
      - "B) Sorghum residue (sorgoleone and related compounds)"
      - "C) Wheat straw"
      - "D) Clover residue"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Sorghum produces sorgoleone from root hairs, a potent allelochemical that inhibits photosystem II in sensitive plants. Sorghum residues also contain dhurrin and phenolic acids. This can suppress weeds but also inhibit small-seeded crops planted soon after."
    tags: [allelopathy, sorghum, sorgoleone, crop_rotation, weed_suppression]

  - id: factual_crop_0013
    question_type: mcq
    difficulty: medium
    regions: [asia, tropics]
    turns:
      - role: user
        content: |
          Paddy rice cultivation under flooded conditions contributes to greenhouse gas emissions primarily through which mechanism?
    choices:
      - "A) Nitrous oxide (N2O) emissions from nitrification"
      - "B) Carbon dioxide (CO2) from root respiration only"
      - "C) Methane (CH4) production by methanogenic archaea in anaerobic soil conditions"
      - "D) Ozone (O3) depletion from pesticide volatilization"
    correct_answer: "C"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "C"
    source_notes: "Flooded rice paddies create anaerobic conditions ideal for methanogenic archaea. Rice paddies account for approximately 10-12% of global anthropogenic methane emissions. Alternate wetting and drying (AWD) can reduce CH4 by 30-50%."
    tags: [rice, methane, greenhouse_gas, paddy, asia, climate]

  - id: factual_crop_0014
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          Which of the following is a CAM (Crassulacean Acid Metabolism) crop?
    choices:
      - "A) Corn"
      - "B) Pineapple"
      - "C) Barley"
      - "D) Sunflower"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Pineapple uses CAM photosynthesis, opening stomata at night to fix CO2 into organic acids, then releasing CO2 internally during the day for the Calvin cycle. This minimizes water loss and is an adaptation to arid/semi-arid conditions. Agave and sisal are other CAM crops."
    tags: [photosynthesis, cam, pineapple, water_use_efficiency]

  - id: factual_crop_0015
    question_type: mcq
    difficulty: medium
    regions: [west_africa]
    turns:
      - role: user
        content: |
          Fonio (Digitaria exilis) is an ancient grain crop of West Africa. What is its primary agronomic advantage?
    choices:
      - "A) It produces the highest yield per hectare of any cereal globally"
      - "B) It matures extremely rapidly (6-8 weeks) and grows on poor, sandy soils where other cereals fail"
      - "C) It is the only cereal that fixes its own nitrogen"
      - "D) It requires irrigation and heavy fertilization for successful production"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Fonio is the fastest-maturing cereal (42-56 days to harvest for some varieties). It thrives on nutrient-poor laterite and sandy soils in the Sahel. Called the 'hungry rice' because it bridges the gap before main crops mature."
    tags: [fonio, west_africa, small_grains, dryland, food_security]

  - id: factual_crop_0016
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Answer concisely."
    turns:
      - role: user
        content: |
          What are the key differences between C3 and C4 photosynthetic pathways? Provide at least two examples of crop species for each pathway.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["C3", "C4", "photorespiration"]
      rubric_criteria:
        - name: c3_mechanism
          description: "Explains C3 uses RuBisCO directly, first product is a 3-carbon compound, susceptible to photorespiration"
          max_points: 2
        - name: c4_mechanism
          description: "Explains C4 has a CO2 concentrating mechanism (PEP carboxylase), first product is a 4-carbon compound, reduced photorespiration"
          max_points: 2
        - name: c3_examples
          description: "Provides correct C3 examples such as wheat, rice, soybean, barley, oats"
          max_points: 2
        - name: c4_examples
          description: "Provides correct C4 examples such as corn, sorghum, sugarcane, millet, switchgrass"
          max_points: 2
        - name: efficiency_comparison
          description: "Notes C4 is more efficient in hot, dry, high-light conditions"
          max_points: 2
    source_notes: "C3 crops (wheat, rice, soybean) lose 20-40% of fixed carbon to photorespiration. C4 crops (corn, sorghum, sugarcane) concentrate CO2 around RuBisCO, virtually eliminating photorespiration and increasing water use efficiency."
    tags: [photosynthesis, c3, c4, plant_physiology, water_use_efficiency]

  - id: factual_crop_0017
    question_type: mcq
    difficulty: hard
    regions: [global]
    turns:
      - role: user
        content: |
          Which legume species typically fixes the LEAST amount of nitrogen per hectare per year?
    choices:
      - "A) Alfalfa (Medicago sativa), ~150-250 kg N/ha"
      - "B) Pigeon pea (Cajanus cajan), ~40-90 kg N/ha"
      - "C) White clover (Trifolium repens), ~100-150 kg N/ha"
      - "D) Leucaena (Leucaena leucocephala), ~100-500 kg N/ha"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Pigeon pea fixes 40-90 kg N/ha/year, less than many temperate legumes. However, pigeon pea has deep roots (2+ meters) that mine subsoil nutrients and break hardpans, making it invaluable in tropical farming systems."
    tags: [nitrogen_fixation, legumes, pigeon_pea, alfalfa, comparative]

  - id: factual_crop_0018
    question_type: mcq
    difficulty: easy
    regions: [global]
    turns:
      - role: user
        content: |
          What is the recommended seeding rate range for crimson clover (Trifolium incarnatum) as a cover crop when drilled?
    choices:
      - "A) 1-3 kg/ha"
      - "B) 12-20 kg/ha"
      - "C) 80-100 kg/ha"
      - "D) 200-300 kg/ha"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Crimson clover drilled seeding rate is typically 12-20 kg/ha (10-18 lbs/acre). Broadcast rates are 25-30% higher to compensate for reduced seed-soil contact."
    tags: [seeding_rates, cover_crops, crimson_clover, legumes]

  - id: factual_crop_0019
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Answer concisely."
    turns:
      - role: user
        content: |
          Explain the principles of crop rotation for soilborne disease management. What is the minimum recommended rotation interval, and why do some pathogens require longer breaks?
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["rotation", "disease", "years"]
      rubric_criteria:
        - name: minimum_interval
          description: "States 3-4 year minimum rotation interval for most crop families"
          max_points: 3
        - name: mechanism
          description: "Explains that rotation starves soilborne pathogens by removing their host crop family"
          max_points: 3
        - name: persistent_pathogens
          description: "Notes some pathogens (Verticillium, clubroot, white mold) form persistent resting structures and may need 5-7+ year breaks"
          max_points: 3
    source_notes: "A 3-4 year rotation interval is the standard recommendation. Some pathogens (e.g., Verticillium microsclerotia, Plasmodiophora brassicae resting spores) persist in soil for 5-20 years, requiring longer rotations or resistant varieties."
    tags: [crop_rotation, disease_break, soilborne_pathogens, solanaceae]

  - id: factual_crop_0020
    question_type: mcq
    difficulty: hard
    regions: [tropics]
    turns:
      - role: user
        content: |
          Moringa (Moringa oleifera) is widely promoted as a multipurpose tree in tropical smallholder systems. Which of the following correctly describes its agronomic characteristics?
    choices:
      - "A) Moringa is a slow-growing hardwood that requires 10+ years to first harvest"
      - "B) Moringa is a fast-growing tree that can be coppiced repeatedly, with leaves containing approximately 27% protein on a dry-weight basis"
      - "C) Moringa can only grow in rich alluvial soils with pH above 7.5"
      - "D) Moringa produces no usable products until the tree reaches full maturity at 15 years"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Moringa oleifera grows 3-5 meters in its first year, tolerates coppicing for intensive leaf production, and thrives in poor soils (pH 5-9). Leaves contain ~27% protein, plus high levels of vitamins A, C, and minerals. Seeds can purify water."
    tags: [moringa, agroforestry, tropics, protein, multipurpose_trees]

  - id: factual_crop_0021
    question_type: short_answer
    difficulty: easy
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Answer concisely."
    turns:
      - role: user
        content: |
          What is a cover crop cocktail (multi-species mix)? Name at least four functional groups that might be included and give one species example from each group.
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["legume", "grass"]
      rubric_criteria:
        - name: definition
          description: "Defines a cover crop cocktail as a multi-species blend designed for diverse root architectures and functions"
          max_points: 2
        - name: four_groups
          description: "Names at least four groups such as: legumes (N-fixing), grasses (biomass/carbon), brassicas (biofumigation), broadleaves (taproot/diversity)"
          max_points: 4
        - name: species_examples
          description: "Provides at least one correct species per functional group named"
          max_points: 3
    source_notes: "Cover crop cocktails typically include: legumes (clover, vetch), cool-season grasses (cereal rye, oats), brassicas (radish, turnip), broadleaves (sunflower, phacelia). Diversity improves root exudate variety and soil biology."
    tags: [cover_crops, multi_species, cocktail_mix, diversity]

  - id: factual_crop_0022
    question_type: mcq
    difficulty: medium
    regions: [mediterranean, temperate]
    turns:
      - role: user
        content: |
          Barley (Hordeum vulgare) is preferred over wheat in many dryland Mediterranean and semi-arid regions because:
    choices:
      - "A) Barley has higher protein content than wheat in all conditions"
      - "B) Barley has greater salt tolerance, earlier maturity, and better performance on marginal soils than wheat"
      - "C) Barley requires more water than wheat but produces triple the yield"
      - "D) Barley is a legume and fixes its own nitrogen"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Barley is more salt-tolerant, drought-tolerant, and faster-maturing than wheat. It can produce grain on as little as 200-250 mm rainfall. It tolerates soil salinity up to ~8 dS/m (vs ~6 dS/m for wheat)."
    tags: [barley, wheat, dryland, salt_tolerance, mediterranean]

  - id: factual_crop_0023
    question_type: mcq
    difficulty: hard
    regions: [sub_saharan_africa, south_asia]
    turns:
      - role: user
        content: |
          Cowpea (Vigna unguiculata) is a critical grain legume in semi-arid tropical systems. What makes it particularly suited to intercropping with pearl millet in the Sahel?
    choices:
      - "A) Cowpea is a tall-growing crop that shades millet, reducing heat stress"
      - "B) Cowpea has an indeterminate prostrate growth habit, fixes 40-80 kg N/ha, tolerates drought and sandy soils, and matures after millet harvest allowing relay cropping"
      - "C) Cowpea requires the same planting and harvest dates as millet"
      - "D) Cowpea produces allelopathic compounds that eliminate all weeds around millet"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Cowpea-millet intercropping is a foundational system across the Sahel. Cowpea's prostrate habit doesn't compete for light, it fixes N, and its drought tolerance matches millet. The dual-crop system provides both protein and carbohydrates on minimal rainfall (~300 mm)."
    tags: [cowpea, millet, intercropping, sahel, dryland, nitrogen_fixation]

  - id: factual_crop_0024
    question_type: mcq
    difficulty: medium
    regions: [global]
    turns:
      - role: user
        content: |
          What soil temperature (at 5 cm depth) is generally required for successful germination of most warm-season cover crops such as cowpea, sorghum-sudangrass, and buckwheat?
    choices:
      - "A) At or above 0 degrees Celsius"
      - "B) At or above 10-15 degrees Celsius"
      - "C) At or above 30 degrees Celsius"
      - "D) At or above 40 degrees Celsius"
    correct_answer: "B"
    scoring_method: exact_match
    scoring_config:
      ground_truth: "B"
    source_notes: "Most warm-season cover crops require soil temperatures of at least 10-15 degrees C for reliable germination. Sorghum-sudangrass prefers 15+ C, buckwheat germinates at 10+ C, and cowpea at 15+ C."
    tags: [germination, soil_temperature, cover_crops, warm_season]

  - id: factual_crop_0025
    question_type: short_answer
    difficulty: medium
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Answer concisely."
    turns:
      - role: user
        content: |
          Compare the root architecture and rooting depth of four major oilseed crops: soybean, sunflower, flax (linseed), and sesame. Which has the deepest root system, and how does root architecture affect their roles in crop rotation?
    scoring_method: keyword_rubric
    scoring_config:
      required_keywords: ["taproot", "sunflower"]
      rubric_criteria:
        - name: sunflower_deepest
          description: "Identifies sunflower as having the deepest taproot (1.5-3 meters), valuable for breaking compaction"
          max_points: 3
        - name: comparative_depths
          description: "Provides reasonable depth comparisons for at least 3 of the 4 crops (soybean ~1m, sesame ~1m, flax ~0.6-1m)"
          max_points: 3
        - name: rotation_role
          description: "Explains how deep-rooted crops mine subsoil nutrients and break compacted layers, benefiting subsequent crops in rotation"
          max_points: 3
    source_notes: "Sunflower taproot reaches 1.5-3 m. Sesame taproot ~0.9-1.2 m. Soybean taproot ~0.6-1.5 m. Flax relatively shallow ~0.6-1 m. Deep roots improve soil structure and access deep moisture and nutrients for following crops."
    tags: [sunflower, root_architecture, oilseeds, compaction, taproot, crop_rotation]

  - id: factual_crop_0026
    question_type: short_answer
    difficulty: hard
    regions: [global]
    system_prompt: "You are a regenerative agriculture expert. Answer concisely."
    turns:
      - role: user
        content: |
