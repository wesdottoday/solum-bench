questions:
  # ============================================================
  # SOIL TEST REPORTS (15 questions)
  # ============================================================

  - id: data_interp_0001
    question_type: data_interpretation
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Tropical Ferralsol
      Location: Kisangani, Congo Basin, Democratic Republic of Congo
      Depth: 0-20 cm
      Land use: Slash-and-burn agriculture (cassava/maize rotation)

      Physical properties:
        Texture: Clay (68% clay, 18% silt, 14% sand)
        Bulk density: 1.08 g/cm3
        Color (moist): 2.5YR 4/6 (dark red)

      Chemical properties:
        pH (H2O): 4.3
        pH (KCl): 3.6
        Organic carbon: 1.8%
        Total nitrogen: 0.15%
        Available P (Bray-1): 2.1 mg/kg
        Exchangeable cations (cmol(c)/kg):
          Ca: 0.82
          Mg: 0.34
          K: 0.11
          Na: 0.03
          Al: 2.95
          H: 0.48
        ECEC: 4.73 cmol(c)/kg
        Base saturation: 27.5%
        Al saturation: 62.4%
        Available micronutrients (mg/kg):
          Fe: 42.3
          Mn: 8.7
          Zn: 0.6
          Cu: 1.2
    turns:
      - role: user
        content: |
          Analyze this Ferralsol soil test report from the Congo Basin. Identify the primary fertility constraints and recommend regenerative management strategies appropriate for smallholder farmers in this region. What are the critical limiting factors for crop production?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        ph: 4.3
        al_saturation: 62.4
        available_p: 2.1
        ecec: 4.73
        base_saturation: 27.5
      dimensions:
        - data_grounding
        - factual_accuracy
        - practical_actionability
    source_notes: "Model should identify Al toxicity (62.4% Al sat), severe P deficiency (2.1 mg/kg Bray-1), very low CEC, and strong acidity as primary constraints. Should recommend biomass recycling, P-efficient crops, and agroforestry rather than heavy liming."
    tags: [data_interpretation, ferralsol, tropical, africa, al_toxicity, phosphorus]

  - id: data_interp_0002
    question_type: data_interpretation
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Vertisol
      Location: Bhavnagar District, Gujarat, India
      Depth: 0-30 cm
      Land use: Cotton-wheat rotation (rainfed)

      Physical properties:
        Texture: Heavy clay (62% clay, 24% silt, 14% sand)
        Bulk density: 1.32 g/cm3
        Color (dry): 10YR 3/1 (very dark gray)
        Linear extensibility: 9.2 cm/m (high shrink-swell)
        Cracks when dry: Yes, up to 3 cm wide, 50 cm deep

      Chemical properties:
        pH (H2O): 8.1
        EC: 0.42 dS/m
        Organic carbon: 0.62%
        Total nitrogen: 0.06%
        Available P (Olsen): 6.8 mg/kg
        Exchangeable cations (cmol(c)/kg):
          Ca: 28.4
          Mg: 14.2
          K: 0.62
          Na: 0.98
        CEC: 48.6 cmol(c)/kg
        Base saturation: 90.8%
        ESP: 2.0%
        Available micronutrients (mg/kg):
          Fe: 3.8
          Mn: 5.4
          Zn: 0.42
          Cu: 1.8
    turns:
      - role: user
        content: |
          Interpret this Vertisol soil test from Gujarat. What are the key management challenges and nutrient deficiencies? How does the high CEC interact with the shrink-swell behavior, and what regenerative practices would you recommend for improving this soil?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        cec: 48.6
        ph: 8.1
        organic_carbon: 0.62
        available_p: 6.8
        zinc: 0.42
        iron: 3.8
      dimensions:
        - data_grounding
        - factual_accuracy
        - practical_actionability
    source_notes: "Model should identify low organic carbon (0.62%), Zn deficiency (<0.6 mg/kg is deficient), Fe deficiency at alkaline pH, marginal P, and the physical challenges of cracking clay. Ca:Mg ratio of 2:1 is slightly Mg-heavy. Should discuss difficulty of tillage timing with Vertisols."
    tags: [data_interpretation, vertisol, india, asia, micronutrient, shrink_swell]

  - id: data_interp_0003
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Podzol
      Location: Jyvaskyla, Central Finland
      Depth: 0-25 cm (combined O/A horizon)
      Land use: Boreal coniferous forest (Norway spruce), potential conversion to blueberry cultivation

      Physical properties:
        Texture: Loamy sand (78% sand, 14% silt, 8% clay)
        Bulk density: 0.92 g/cm3
        Color (moist): 10YR 2/1 (black organic layer over gray E horizon)

      Chemical properties:
        pH (H2O): 4.1
        pH (CaCl2): 3.5
        Organic carbon: 8.4%
        Total nitrogen: 0.38%
        C:N ratio: 22.1
        Available P (Bray-1): 4.8 mg/kg
        Exchangeable cations (cmol(c)/kg):
          Ca: 1.24
          Mg: 0.42
          K: 0.18
          Na: 0.06
          Al: 3.82
          H: 2.14
        ECEC: 7.86 cmol(c)/kg
        Base saturation: 24.2%
        Al saturation: 48.6%
    turns:
      - role: user
        content: |
          This Podzol in Finland is being considered for blueberry cultivation. Analyze the soil test and assess whether the soil conditions are suitable for blueberries. What amendments, if any, would you recommend? Identify key fertility limitations.
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        ph: 4.1
        organic_carbon: 8.4
        base_saturation: 24.2
        al_saturation: 48.6
        cn_ratio: 22.1
      dimensions:
        - data_grounding
        - factual_accuracy
        - practical_actionability
    source_notes: "Model should note that pH 4.1 is actually favorable for blueberries (prefer 4.0-5.5), high organic matter is a plus, but P is very low and Al saturation is high. Should not recommend heavy liming (would harm blueberries). C:N of 22 suggests moderate decomposition."
    tags: [data_interpretation, podzol, finland, europe, blueberry, boreal]

  - id: data_interp_0004
    question_type: data_interpretation
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Andisol (Andosol)
      Location: Tokachi Plain, Hokkaido, Japan
      Depth: 0-25 cm
      Land use: Potato-sugar beet-wheat rotation

      Physical properties:
        Texture: Silt loam (22% sand, 58% silt, 20% clay)
        Bulk density: 0.68 g/cm3
        Color (moist): 10YR 2/2 (very dark brown)
        Water retention at 1500 kPa: 42%
        Allophane content: 14.2%
        Phosphate retention: 92%

      Chemical properties:
        pH (H2O): 5.8
        pH (NaF): 11.2
        Organic carbon: 6.8%
        Total nitrogen: 0.52%
        C:N ratio: 13.1
        Available P (Truog): 8.4 mg/kg
        Total P: 2,840 mg/kg
        Exchangeable cations (cmol(c)/kg):
          Ca: 8.6
          Mg: 2.4
          K: 0.52
          Na: 0.12
        CEC (pH 7): 32.4 cmol(c)/kg
        ECEC: 14.8 cmol(c)/kg
        Base saturation (ECEC): 78.6%
        Available micronutrients (mg/kg):
          Fe: 68.4
          Mn: 22.1
          Zn: 2.8
          Cu: 0.8
          B: 0.3
    turns:
      - role: user
        content: |
          Analyze this Andisol soil test from Hokkaido. Explain the significance of the large difference between total P and available P. Why is the CEC measured at pH 7 so much higher than ECEC? What management strategies would optimize phosphorus availability in this soil?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        phosphate_retention: 92.0
        total_p: 2840.0
        available_p: 8.4
        bulk_density: 0.68
        allophane: 14.2
        cec_ph7: 32.4
        ecec: 14.8
      dimensions:
        - data_grounding
        - factual_accuracy
        - reasoning_depth
    source_notes: "Model should explain allophane-driven P fixation (92% retention locks up P), the variable charge nature of Andisols (CEC 32.4 at pH 7 vs ECEC 14.8 reflects pH-dependent charge from allophane), low bulk density from volcanic glass structure, and recommend banded P application and mycorrhizal inoculation."
    tags: [data_interpretation, andisol, japan, asia, phosphorus_fixation, allophane]

  - id: data_interp_0005
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Chernozem
      Location: Poltava Oblast, Central Ukraine
      Depth: 0-30 cm
      Land use: Sunflower-winter wheat-maize rotation

      Physical properties:
        Texture: Silty clay loam (12% sand, 56% silt, 32% clay)
        Bulk density: 1.18 g/cm3
        Color (moist): 10YR 2/1 (black)
        Aggregate stability (WSA >0.25mm): 72%

      Chemical properties:
        pH (H2O): 6.8
        Organic carbon: 3.4%
        Organic matter: 5.9%
        Total nitrogen: 0.31%
        C:N ratio: 11.0
        Available P (Olsen): 24.6 mg/kg
        Available K: 186 mg/kg
        Exchangeable cations (cmol(c)/kg):
          Ca: 22.8
          Mg: 5.4
          K: 0.96
          Na: 0.18
        CEC: 32.6 cmol(c)/kg
        Base saturation: 90.0%
        Available S: 12.4 mg/kg
        Available micronutrients (mg/kg):
          Fe: 18.6
          Mn: 14.2
          Zn: 1.8
          Cu: 2.4
          B: 0.82
    turns:
      - role: user
        content: |
          Evaluate this Chernozem soil from Ukraine. Is this soil in good health? Compare the values to ideal ranges for the sunflower-wheat-maize rotation. What, if anything, needs attention? Calculate the Ca:Mg ratio and assess its implications.
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        organic_matter: 5.9
        ph: 6.8
        cec: 32.6
        available_p: 24.6
        base_saturation: 90.0
        ca_mg_ratio: 4.2
      dimensions:
        - data_grounding
        - factual_accuracy
        - practical_actionability
    source_notes: "Model should recognize this as a highly fertile soil. Ca:Mg ratio is 22.8/5.4 = 4.2, which is ideal (3-5 range). P at 24.6 is adequate for these crops. The 72% aggregate stability is good. S at 12.4 may be marginal for canola/sunflower. Overall a benchmark-quality soil."
    tags: [data_interpretation, chernozem, ukraine, europe, fertility, ca_mg_ratio]

  - id: data_interp_0006
    question_type: data_interpretation
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Sandy Arenosol
      Location: Niamey Region, Niger, West Africa (Sahel)
      Depth: 0-20 cm
      Land use: Millet monoculture (rainfed)

      Physical properties:
        Texture: Sand (92% sand, 5% silt, 3% clay)
        Bulk density: 1.62 g/cm3
        Color (moist): 10YR 6/3 (pale brown)
        Water holding capacity: 6.2% (w/w)

      Chemical properties:
        pH (H2O): 5.4
        Organic carbon: 0.18%
        Total nitrogen: 0.018%
        C:N ratio: 10.0
        Available P (Bray-1): 3.2 mg/kg
        Exchangeable cations (cmol(c)/kg):
          Ca: 0.48
          Mg: 0.12
          K: 0.06
          Na: 0.02
          Al: 0.14
          H: 0.08
        ECEC: 0.90 cmol(c)/kg
        Base saturation: 75.6%
        Available micronutrients (mg/kg):
          Fe: 12.8
          Mn: 4.2
          Zn: 0.22
          Cu: 0.3
    turns:
      - role: user
        content: |
          This Arenosol from the Sahel supports smallholder millet production. Analyze the data and identify the most severe constraints. What low-cost, locally available regenerative strategies could improve productivity? Consider water, nutrients, and organic matter.
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        ecec: 0.90
        organic_carbon: 0.18
        water_holding_capacity: 6.2
        available_p: 3.2
        zinc: 0.22
      dimensions:
        - data_grounding
        - factual_accuracy
        - practical_actionability
    source_notes: "Model should identify extremely low CEC (0.90), negligible organic matter (0.18% OC), severe Zn deficiency, low water holding capacity, and P deficiency. Should recommend zai pits, half-moon water harvesting, compost/manure, Faidherbia albida agroforestry, and microdosing fertilizer."
    tags: [data_interpretation, arenosol, sahel, west_africa, low_fertility, water_scarcity]

  - id: data_interp_0007
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Mollisol (Typic Hapludoll)
      Location: Story County, Iowa, USA
      Depth: 0-20 cm
      Land use: Corn-soybean rotation (no-till, 4th year)

      Physical properties:
        Texture: Silty clay loam (8% sand, 60% silt, 32% clay)
        Bulk density: 1.28 g/cm3
        Color (moist): 10YR 3/2 (very dark grayish brown)
        Aggregate stability (WSA): 58%

      Chemical properties:
        pH (H2O): 6.4
        Buffer pH: 6.8
        Organic matter: 4.2%
        Available P (Bray-1): 32 mg/kg
        Available K: 168 mg/kg
        Exchangeable cations (cmol(c)/kg):
          Ca: 14.8
          Mg: 3.6
          K: 0.86
          Na: 0.08
          H: 3.46
        CEC: 22.8 cmol(c)/kg
        Base saturation: 84.8%
        Available S: 8.4 mg/kg
        Available micronutrients (mg/kg):
          Fe: 42.0
          Mn: 18.6
          Zn: 3.2
          Cu: 1.6
          B: 0.72
    turns:
      - role: user
        content: |
          Evaluate this Iowa Mollisol currently in no-till corn-soybean rotation. Is the soil health improving under no-till management? What do the aggregate stability and organic matter values suggest? Are there any nutrient concerns for either corn or soybean production?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        organic_matter: 4.2
        ph: 6.4
        cec: 22.8
        available_p: 32.0
        available_k: 168.0
        aggregate_stability: 58.0
      dimensions:
        - data_grounding
        - factual_accuracy
        - practical_actionability
    source_notes: "Model should note OM at 4.2% is good for Iowa, P at 32 is optimum to high, K at 168 is adequate, aggregate stability of 58% in 4th year no-till is improving but has room to grow (native prairie would be >70%). S at 8.4 may be marginal for corn. Buffer pH of 6.8 suggests moderate lime need."
    tags: [data_interpretation, mollisol, iowa, usa, north_america, no_till, corn_soy]

  - id: data_interp_0008
    question_type: data_interpretation
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Saline-Sodic Soil
      Location: Barmer District, Rajasthan, India
      Depth: 0-30 cm
      Land use: Degraded rangeland, proposed rehabilitation

      Physical properties:
        Texture: Sandy clay loam (52% sand, 22% silt, 26% clay)
        Bulk density: 1.58 g/cm3
        Color (dry): 10YR 7/2 (light gray, white salt crust visible)
        Infiltration rate: 0.8 mm/hr (very slow)

      Chemical properties:
        pH (H2O): 9.2
        EC (1:2 extract): 8.6 dS/m
        EC (saturation extract): 16.4 dS/m
        Organic carbon: 0.24%
        Total nitrogen: 0.024%
        Available P (Olsen): 4.2 mg/kg
        Exchangeable cations (cmol(c)/kg):
          Ca: 4.8
          Mg: 2.6
          K: 0.42
          Na: 8.4
        CEC: 18.2 cmol(c)/kg
        ESP: 46.2%
        SAR: 18.6
        Available micronutrients (mg/kg):
          Fe: 2.1
          Mn: 1.8
          Zn: 0.18
          Cu: 0.4
        Soluble salts (meq/L):
          Na: 86.4
          Cl: 52.8
          SO4: 38.2
          HCO3: 14.6
    turns:
      - role: user
        content: |
          Analyze this saline-sodic soil from Rajasthan. Classify the soil using the USDA salinity classification system (saline, sodic, or saline-sodic). What is the reclamation strategy, and in what order should problems be addressed? Estimate the gypsum requirement.
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        ec_sat: 16.4
        esp: 46.2
        sar: 18.6
        ph: 9.2
        sodium_exchangeable: 8.4
        infiltration: 0.8
      dimensions:
        - data_grounding
        - factual_accuracy
        - reasoning_depth
        - practical_actionability
    source_notes: "Model should classify as saline-sodic (EC >4, ESP >15, pH >8.5). Must address sodicity first with gypsum (Ca replaces Na on exchange sites), then leach salts with good drainage. ESP of 46.2% is severe. Should discuss halophyte revegetation, organic matter addition, and phased reclamation."
    tags: [data_interpretation, saline_sodic, rajasthan, india, asia, reclamation, gypsum]

  - id: data_interp_0009
    question_type: data_interpretation
    difficulty: medium
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Recent Alluvial Soil
      Location: Canterbury Plains, South Island, New Zealand
      Depth: 0-20 cm
      Land use: Mixed cropping (wheat, barley, ryegrass seed)

      Physical properties:
        Texture: Fine sandy loam (52% sand, 32% silt, 16% clay)
        Bulk density: 1.34 g/cm3
        Color (moist): 10YR 4/3 (brown)
        Stones (>2mm): 18% by volume

      Chemical properties:
        pH (H2O): 5.9
        Organic carbon: 2.8%
        Total nitrogen: 0.26%
        C:N ratio: 10.8
        Available P (Olsen): 18.0 mg/kg
        Available K (quick test): 8 (MAF units)
        Exchangeable cations (cmol(c)/kg):
          Ca: 6.8
          Mg: 1.4
          K: 0.52
          Na: 0.14
        CEC: 14.2 cmol(c)/kg
        Base saturation: 62.4%
        Available S (sulphate-S): 6.2 mg/kg
        Available micronutrients (mg/kg):
          Fe: 86.0
          Mn: 24.6
          Zn: 2.4
          Cu: 1.1
          B: 0.48
          Mo: 0.06
    turns:
      - role: user
        content: |
          Interpret this Canterbury Plains soil test for mixed arable cropping. Using New Zealand soil test interpretation guidelines, assess P, K, and S status. Is the soil pH optimal? What nutrient management adjustments would improve yields, and how do the stony conditions affect management?
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        olsen_p: 18.0
        ph: 5.9
        cec: 14.2
        available_s: 6.2
        organic_carbon: 2.8
        stone_content: 18.0
      dimensions:
        - data_grounding
        - factual_accuracy
        - practical_actionability
        - regional_adaptation
    source_notes: "Model should use NZ interpretation: Olsen P 18 is near optimum for cropping (20-30 target), K at 8 MAF units is above optimum (5-8 range), S at 6.2 is low (target >10 for crops). pH 5.9 is slightly low for barley (prefers 6.0-6.5). Stones reduce effective rooting volume and water storage."
    tags: [data_interpretation, alluvial, canterbury, new_zealand, oceania, arable]

  - id: data_interp_0010
    question_type: data_interpretation
    difficulty: hard
    regions: [global]
    system_prompt: "You are a soil science expert. Analyze the provided data carefully. Reference specific values in your response."
    context_data: |
      Soil Test Report - Oxisol (Latossolo Vermelho)
      Location: Sorriso, Mato Grosso, Brazil
      Depth: 0-20 cm
      Land use: Soybean-maize double crop (safrinha system)

      Physical properties:
        Texture: Clay (72% clay, 16% silt, 12% sand)
        Bulk density: 1.04 g/cm3
        Color (moist): 2.5YR 3/6 (dark red)

      Chemical properties:
        pH (H2O): 5.1
        pH (CaCl2): 4.4
        Organic carbon: 2.2%
        Total nitrogen: 0.19%
        Available P (Mehlich-1): 6.8 mg/kg
        Available P (resin): 12.4 mg/kg
        Available K: 62 mg/kg
        Exchangeable cations (cmol(c)/kg):
          Ca: 1.82
          Mg: 0.64
          K: 0.16
          Al: 0.42
        ECEC: 3.38 cmol(c)/kg
        CEC at pH 7: 8.6 cmol(c)/kg
        V% (base saturation): 30.5%
        m% (Al saturation): 12.4%
        Available S: 4.8 mg/kg
        Available micronutrients (mg/kg):
          Fe: 34.2
          Mn: 6.8
          Zn: 0.82
          Cu: 0.6
          B: 0.28
          Mo: 0.04
    turns:
      - role: user
        content: |
          Analyze this Cerrado Oxisol used for soybean-maize production. Interpret V% and m% values. Why do Mehlich-1 and resin P values differ, and which is more reliable for this soil? What amendments are needed for optimal soybean and maize yields? Address both macro and micronutrient needs.
    scoring_method: composite
    scoring_config:
      methods:
        - numeric_grounding
        - llm_judge
      expected_values:
        v_percent: 30.5
        m_percent: 12.4
        mehlich_p: 6.8
        resin_p: 12.4
        cec_ph7: 8.6
        ecec: 3.38
      dimensions:
        - data_grounding
        - factual_accuracy
        - reasoning_depth
        - practical_actionability
    source_notes: "Model should explain that V% of 30.5% needs to reach 50-60% for soy/maize (requires liming), m% at 12.4% is moderate Al stress. Resin P is preferred for Oxisols (Mehlich-1 underestimates due to Fe/Al oxide interference). B, Mo deficiencies are critical for soybean N fixation. K at 62 mg/kg is low."
    tags: [data_interpretation, oxisol, cerrado, brazil, south_america, soybean, liming]

